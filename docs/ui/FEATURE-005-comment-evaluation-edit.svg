  <rect x="680" y="862" width="14" height="10" class="editable-panel"/>
  <text x="700" y="872" class="muted" font-size="10">코멘트/평가 수정 가능</text>

  <rect x="1064" y="128" width="308" height="760" rx="10" class="panel"/>
  <text x="1090" y="166" class="text" font-size="18" font-weight="700">기보 상세 패널</text>
  <text x="1090" y="190" class="muted" font-size="12">FEATURE-003과 같은 수순 목록 + 메타데이터 탭 구조</text>

  <rect x="1090" y="214" width="256" height="342" rx="8" class="subpanel"/>
  <text x="1110" y="244" class="text" font-size="15" font-weight="700">수순 목록</text>
  <text x="1216" y="244" class="muted" font-size="12">SAN</text>
  <rect x="1248" y="228" width="72" height="24" rx="12" class="badge-readonly"/>
  <text x="1261" y="245" class="muted" font-size="11" font-weight="700">읽기 전용</text>
  <line x1="1110" y1="262" x2="1326" y2="262" class="line"/>
  <text x="1122" y="286" class="muted" font-size="11">#</text>
  <text x="1164" y="286" class="muted" font-size="11">백</text>
  <text x="1248" y="286" class="muted" font-size="11">흑</text>
  <line x1="1230" y1="296" x2="1230" y2="466" class="line"/>
  <rect x="1110" y="306" width="216" height="36" rx="6" class="move-cell-muted"/>
  <text x="1124" y="329" class="muted" font-size="13" font-weight="700">10.</text>
  <text x="1164" y="329" class="muted" font-size="13">O-O</text>
  <text x="1248" y="329" class="muted" font-size="13">d6</text>
  <rect x="1110" y="350" width="216" height="36" rx="6" class="move-cell-muted"/>
  <text x="1124" y="373" class="muted" font-size="13" font-weight="700">11.</text>
  <text x="1164" y="373" class="muted" font-size="13">Re1</text>
  <text x="1248" y="373" class="muted" font-size="13">Bb7</text>
