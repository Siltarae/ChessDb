  <text x="1210" y="654" class="muted" font-size="12">12. Bxe6!!</text>
  <rect x="1110" y="674" width="216" height="74" rx="7" class="field-focus"/>
  <text x="1124" y="700" class="text" font-size="12">킹사이드 압박을 열어 둔 핵심 수.</text>
  <text x="1124" y="722" class="text" font-size="12">후속 ...fxe6 이후 e6 약점이 남는다.</text>
  <line x1="1124" y1="738" x2="1294" y2="738" stroke="#2f5f73" stroke-width="1" opacity="0.38"/>
  <rect x="1110" y="762" width="118" height="26" rx="13" class="badge-ok"/>
  <circle cx="1126" cy="775" r="4" fill="#2d8b57"/>
  <text x="1138" y="779" class="text" font-size="11" font-weight="700">자동 저장됨</text>

