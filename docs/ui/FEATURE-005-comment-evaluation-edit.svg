  <text x="1110" y="878" class="muted" font-size="11">구현 후보 메모: FEATURE-003 탭 순서와 위치를 유지한다. FEATURE-005 상세에서는 정식 수순을 잠그고 같은 메타데이터 탭 안에서 코멘트/평가만 즉시 자동 저장한다.</text>
