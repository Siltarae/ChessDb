  <text x="1248" y="420" class="text" font-size="13" font-weight="700">fxe6</text>
  <rect x="1110" y="444" width="216" height="36" rx="6" class="move-cell-muted"/>
  <text x="1124" y="467" class="muted" font-size="13" font-weight="700">13.</text>
  <text x="1164" y="467" class="muted" font-size="13">Rc1</text>
  <text x="1248" y="467" class="muted" font-size="13">Rc8</text>
  <rect x="1110" y="494" width="216" height="24" rx="12" class="badge-readonly"/>
  <text x="1124" y="511" class="muted" font-size="11">수순 추가, 삭제, SAN 수정 컨트롤 없음</text>

