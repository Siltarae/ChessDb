<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">FEATURE-006 분석 수순 중심 분석 보드 목업</title>
  <desc id="desc">FEATURE-006 분석 보드의 채택 구조다. FEATURE-003/005의 앱 프레임과 640px 중앙 보드 구조를 유지하면서, 우측 패널을 분석 수순 목록, 스크롤 가능한 다음 수 후보, 관련 기보 링크 순서로 재구성한다.</desc>

