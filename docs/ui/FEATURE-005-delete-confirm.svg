<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">FEATURE-005 기보 삭제 확인 상태 중간 충실도 목업</title>
  <desc id="desc">기보 목록에서 특정 기보의 삭제 액션을 누른 직후, 삭제가 즉시 실행되지 않고 확인 상태로 전환되는 화면을 표현한 SVG 스케치다. 삭제 대상 행 강조, 삭제 확인 문구, 삭제와 취소 버튼, 목록 맥락 유지, 확정 전에는 대상 기보가 남아 있음을 보여준다.</desc>

  <defs>
    <style>
      .bg { fill: #f5f7f8; }
      .frame { fill: #ffffff; stroke: #cfd6df; stroke-width: 1.2; }
      .topbar { fill: #fbfcfd; stroke: #e0e5eb; stroke-width: 1; }
      .sidebar { fill: #1f2a30; }
      .sidebar-active { fill: #2f5f73; }
      .surface { fill: #ffffff; stroke: #d7dde5; stroke-width: 1; }
      .panel { fill: #f9fafb; stroke: #d7dde5; stroke-width: 1; }
      .row { fill: #ffffff; stroke: #e4e8ee; stroke-width: 1; }
      .muted-fill { fill: #eef2f6; }
      .selected { fill: #e9f2f5; stroke: #2f5f73; stroke-width: 1.5; }
      .danger { fill: #fff0f0; stroke: #e28b8b; stroke-width: 1; }
      .danger-target { fill: #fff8f8; stroke: #d76767; stroke-width: 2; }
      .danger-strong { fill: #c24141; stroke: #a63333; stroke-width: 1; }
      .warning { fill: #fff8df; stroke: #e2b94b; stroke-width: 1; }
      .success { fill: #e9f7ef; stroke: #83c59b; stroke-width: 1; }
      .button { fill: #ffffff; stroke: #c4ccd6; stroke-width: 1; }
      .accent { fill: #2f5f73; }
      .text { fill: #182026; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .muted { fill: #667085; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse { fill: #ffffff; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .danger-text { fill: #9d2f2f; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .small { font-size: 12px; }
      .label { font-size: 13px; font-weight: 700; }
      .body { font-size: 14px; }
      .title { font-size: 20px; font-weight: 700; }
      .section-title { font-size: 16px; font-weight: 700; }
      .mono { font-family: 'Courier New', monospace; }
      .arrow { fill: none; stroke: #93a3b5; stroke-width: 2; marker-end: url(#arrow-head); }
    </style>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#101820" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-head" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#93a3b5"/>
    </marker>
  </defs>

  <rect width="1600" height="980" class="bg"/>
  <text x="56" y="52" class="text title">FEATURE-005 기보 삭제 확인 상태</text>
  <text x="56" y="80" class="muted body">기보 목록에서 삭제를 누르면 대상 행과 확인 패널이 함께 표시되고, 확정 전에는 기보가 목록에 남아 있다.</text>

  <!-- 기보 목록: 삭제 확인 상태 -->
  <g id="game-delete-confirm-view" transform="translate(56 118)">
    <text x="0" y="-22" class="text section-title">기보 목록에서 특정 기보 삭제를 누른 직후</text>
    <rect x="0" y="0" width="1488" height="706" rx="10" class="frame" filter="url(#shadow)"/>
    <rect x="0" y="0" width="152" height="706" rx="10" class="sidebar"/>
    <rect x="152" y="0" width="1336" height="56" class="topbar"/>

    <text x="28" y="38" class="inverse" font-size="17" font-weight="700">ChessDb</text>
    <rect x="18" y="86" width="116" height="38" rx="7" fill="#26343c"/>
    <text x="48" y="110" class="inverse small">새 기보</text>
    <rect x="18" y="138" width="116" height="38" rx="7" class="sidebar-active"/>
    <text x="45" y="162" class="inverse small" font-weight="700">기보</text>
    <rect x="18" y="190" width="116" height="38" rx="7" fill="#26343c"/>
    <text x="45" y="214" class="inverse small">분석</text>

    <text x="184" y="36" class="text title">기보 목록</text>
    <text x="302" y="36" class="muted body">최근 저장일 기준 날짜순 · 삭제 확인 중</text>
    <rect x="1206" y="14" width="106" height="30" rx="6" fill="#ffffff" stroke="#c4ccd6"/>
    <text x="1232" y="34" class="text small" font-weight="700">날짜순</text>
    <rect x="1324" y="14" width="132" height="30" rx="6" class="muted-fill" stroke="#c4ccd6"/>
    <text x="1352" y="34" class="muted small" font-weight="700">확인 대기</text>

    <rect x="184" y="88" width="884" height="566" rx="8" class="surface"/>
    <text x="212" y="124" class="muted label">저장일</text>
    <text x="358" y="124" class="muted label">결과</text>
    <text x="472" y="124" class="muted label">종료 사유</text>
    <text x="648" y="124" class="muted label">짧은 수순 요약</text>
    <text x="952" y="124" class="muted label">액션</text>
    <line x1="204" y1="140" x2="1048" y2="140" stroke="#e1e6ed"/>

    <g transform="translate(204 156)">
      <rect x="0" y="0" width="844" height="62" rx="7" class="row"/>
      <text x="8" y="25" class="text body" font-weight="700">2026-04-27</text>
      <text x="154" y="25" class="text body">1-0</text>
      <rect x="262" y="9" width="82" height="24" rx="12" class="success"/>
      <text x="280" y="26" class="text small">체크메이트</text>
      <text x="444" y="25" class="text body mono">1. e4 e5 2. Nf3 Nc6 ...</text>
      <rect x="706" y="14" width="54" height="30" rx="6" class="button"/>
      <text x="724" y="34" class="text small" font-weight="700">열기</text>
      <rect x="770" y="14" width="56" height="30" rx="6" class="button"/>
      <text x="786" y="34" class="muted small" font-weight="700">삭제</text>
      <text x="8" y="48" class="muted small">정식 저장됨 · 코멘트 3개 · 평가 5개</text>
    </g>

    <g transform="translate(204 232)">
      <rect x="0" y="0" width="844" height="92" rx="7" class="danger-target"/>
      <rect x="10" y="12" width="4" height="68" rx="2" class="danger-strong"/>
      <text x="28" y="28" class="text body" font-weight="700">2026-04-24</text>
      <text x="174" y="28" class="text body">1/2-1/2</text>
      <rect x="262" y="12" width="72" height="24" rx="12" class="warning"/>
      <text x="281" y="29" class="text small">합의 무승부</text>
      <text x="444" y="28" class="text body mono">1. d4 Nf6 2. c4 e6 ...</text>
      <rect x="706" y="15" width="54" height="30" rx="6" class="button"/>
      <text x="724" y="35" class="text small" font-weight="700">열기</text>
      <rect x="770" y="15" width="56" height="30" rx="6" class="danger"/>
      <text x="786" y="35" class="danger-text small" font-weight="700">삭제</text>
      <rect x="28" y="54" width="128" height="24" rx="12" class="danger"/>
      <text x="48" y="71" class="danger-text small" font-weight="700">삭제 확인 대기</text>
      <text x="176" y="71" class="muted small">아직 삭제되지 않음 · 확인 또는 취소 필요</text>
    </g>

    <g transform="translate(204 342)">
      <rect x="0" y="0" width="844" height="166" rx="8" class="danger"/>
      <text x="26" y="38" class="danger-text section-title">2026-04-24 기보를 삭제할까요?</text>
      <text x="26" y="66" class="text body">삭제는 아직 실행되지 않았다. 아래 삭제 버튼을 누를 때만 목록에서 제거된다.</text>
      <text x="26" y="92" class="muted body">취소하면 확인 상태를 닫고 이 기보 행은 그대로 유지된다.</text>
      <rect x="26" y="116" width="112" height="34" rx="6" class="danger-strong"/>
      <text x="55" y="138" class="inverse small" font-weight="700">삭제</text>
      <rect x="150" y="116" width="112" height="34" rx="6" class="button"/>
      <text x="180" y="138" class="text small" font-weight="700">취소</text>
      <line x1="480" y1="30" x2="480" y2="138" stroke="#e0b2b2"/>
      <text x="506" y="55" class="danger-text small" font-weight="700">상태 단서</text>
      <text x="506" y="82" class="muted small">대상 행은 붉은 테두리와 배지로 식별한다.</text>
      <text x="506" y="106" class="muted small">확정 버튼만 진한 danger 톤을 사용한다.</text>
      <text x="506" y="130" class="muted small">목록 행은 확정 전까지 화면에 남아 있다.</text>
    </g>

    <g transform="translate(204 530)">
      <rect x="0" y="0" width="844" height="62" rx="7" class="row"/>
      <text x="8" y="25" class="text body" font-weight="700">2026-04-20</text>
      <text x="154" y="25" class="text body">0-1</text>
      <rect x="262" y="9" width="52" height="24" rx="12" class="danger"/>
      <text x="280" y="26" class="text small">기권</text>
      <text x="444" y="25" class="text body mono">1. c4 e5 2. Nc3 Nf6 ...</text>
      <rect x="706" y="14" width="54" height="30" rx="6" class="button"/>
      <text x="724" y="34" class="text small" font-weight="700">열기</text>
      <rect x="770" y="14" width="56" height="30" rx="6" class="button"/>
      <text x="786" y="34" class="muted small" font-weight="700">삭제</text>
      <text x="8" y="48" class="muted small">정식 저장됨 · 코멘트 1개 · 평가 2개</text>
    </g>

    <rect x="1100" y="88" width="332" height="566" rx="8" class="panel"/>
    <text x="1128" y="124" class="text section-title">확인 흐름</text>
    <text x="1128" y="150" class="muted small">삭제 액션이 곧바로 데이터 변경으로 이어지지 않는지 검토한다.</text>

    <rect x="1128" y="184" width="276" height="76" rx="7" class="surface"/>
    <text x="1150" y="214" class="text body" font-weight="700">1. 목록에서 삭제 선택</text>
    <text x="1150" y="238" class="muted small">행 액션의 삭제 버튼을 누른 직후</text>
    <path d="M1266 268 L1266 302" class="arrow"/>

    <rect x="1128" y="312" width="276" height="108" rx="7" class="danger"/>
    <text x="1150" y="342" class="danger-text body" font-weight="700">2. 확인 상태 표시</text>
    <text x="1150" y="366" class="muted small">대상 행 강조와 인라인 확인 패널 표시</text>
    <text x="1150" y="390" class="muted small">이 시점에는 기보가 아직 삭제되지 않음</text>
    <path d="M1266 428 L1266 462" class="arrow"/>

    <rect x="1128" y="472" width="276" height="108" rx="7" class="surface"/>
    <text x="1150" y="502" class="text body" font-weight="700">3. 사용자가 결정</text>
    <text x="1150" y="526" class="muted small">삭제: 대상 행 제거 후 목록 갱신</text>
    <text x="1150" y="550" class="muted small">취소: 확인 패널 닫고 기존 목록 유지</text>

    <rect x="1128" y="604" width="276" height="28" rx="6" class="muted-fill"/>
    <text x="1150" y="623" class="muted small">핵심 문구: “아직 삭제되지 않았다”</text>
  </g>

  <!-- 설계 메모 -->
  <g id="design-notes" transform="translate(56 864)">
    <rect x="0" y="0" width="1488" height="74" rx="8" fill="#ffffff" stroke="#d7dde5"/>
    <text x="18" y="28" class="text section-title">UI 결정 메모</text>
    <text x="160" y="28" class="muted small">컴포넌트 후보: GameListView, GameListRow, DeleteGameConfirmPanel. 색상은 FEATURE-005 목록/상세 목업의 흰 표면, 회색 경계, 청록 활성 상태를 유지하고 삭제 확인에만 danger 계열을 제한적으로 사용한다.</text>
    <text x="18" y="54" class="muted small">확인할 UI 질문: 삭제 확인을 대상 행 바로 아래 인라인 패널로 고정할지, 행 내부 확장 영역으로 접어 넣을지 결정한다.</text>
  </g>
</svg>
