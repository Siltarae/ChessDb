<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">FEATURE-005 특정 기보 상세 조회 상태 목업</title>
  <desc id="desc">정식 저장된 특정 기보를 상세 조회하는 중간 충실도 SVG 목업이다. 좌측 전역 사이드바, 상단 현재 기보 정보와 목록으로 돌아가기 액션, 중앙 보드, 우측 읽기 전용 수순 목록과 선택 수 하이라이트, 코멘트와 평가 표시 영역을 배치한다. 정식 저장된 기보의 수순은 수정하지 않고 선택과 조회만 가능하다는 단서를 시각적으로 표현한다.</desc>

  <defs>
    <style>
      .page { fill: #f4f6f8; }
      .surface { fill: #ffffff; }
      .topbar { fill: #fbfcfd; }
      .sidebar { fill: #17202a; }
      .sidebar-soft { fill: #22303d; }
      .sidebar-active { fill: #2f5f73; }
      .panel { fill: #ffffff; stroke: #d4dae2; stroke-width: 1.2; }
      .subpanel { fill: #f8fafc; stroke: #dbe1e8; stroke-width: 1; }
      .line { stroke: #dbe1e8; stroke-width: 1; }
      .text { fill: #15171a; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .muted { fill: #687381; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse { fill: #f8fafc; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse-muted { fill: #aeb8c4; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .button-primary { fill: #2f5f73; }
      .button-secondary { fill: #ffffff; stroke: #bcc7d4; stroke-width: 1; }
      .button-quiet { fill: #eef2f6; stroke: #d7dde5; stroke-width: 1; }
      .badge { fill: #eef4f7; stroke: #c8d6df; stroke-width: 1; }
      .badge-ok { fill: #e8f5ee; stroke: #9fcbb2; stroke-width: 1; }
      .badge-readonly { fill: #eef2f6; stroke: #c4ccd6; stroke-width: 1; }
      .read-note { fill: #fff7e6; stroke: #f0c36a; stroke-width: 1; }
      .light-square { fill: #eef0df; }
      .dark-square { fill: #8ca07c; }
      .last-move { fill: #f5c542; opacity: 0.46; }
      .selected-square { fill: #7dd3fc; opacity: 0.34; }
      .selected { fill: none; stroke: #0f766e; stroke-width: 2.2; opacity: 0.62; }
      .move-cell { fill: #ffffff; stroke: #dbe1e8; stroke-width: 1; }
      .move-cell-muted { fill: #f8fafc; stroke: #e2e7ee; stroke-width: 1; }
      .move-cell-active { fill: #dff0ea; stroke: #72a897; stroke-width: 1.2; }
      .piece-light { fill: #fbfbfb; stroke: #20242a; stroke-width: 1.4; }
      .piece-dark { fill: #20242a; stroke: #20242a; stroke-width: 1.4; }
      .piece-label-light { fill: #20242a; font-family: Georgia, serif; font-weight: 700; }
      .piece-label-dark { fill: #ffffff; font-family: Georgia, serif; font-weight: 700; }
    </style>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.11"/>
    </filter>
    <pattern id="board-pattern" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" class="light-square"/>
      <rect x="80" y="0" width="80" height="80" class="dark-square"/>
      <rect x="0" y="80" width="80" height="80" class="dark-square"/>
    </pattern>
  </defs>

  <rect width="1440" height="980" class="page"/>

  <!-- 전역 앱 프레임 -->
  <rect x="40" y="36" width="1360" height="900" rx="12" class="surface" filter="url(#soft-shadow)"/>
  <rect x="40" y="36" width="88" height="900" rx="12" class="sidebar"/>
  <rect x="128" y="36" width="1272" height="64" class="topbar"/>
  <line x1="128" y1="100" x2="1400" y2="100" class="line"/>
  <line x1="128" y1="36" x2="128" y2="936" stroke="#293746" stroke-width="1"/>

  <!-- 좌측 전역 사이드바 -->
  <text x="84" y="78" text-anchor="middle" class="inverse" font-size="18" font-weight="700">CDB</text>
  <rect x="58" y="126" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="158" text-anchor="middle" class="inverse-muted" font-size="18" font-weight="700">＋</text>
  <text x="84" y="194" text-anchor="middle" class="inverse-muted" font-size="11">입력</text>
  <rect x="58" y="226" width="52" height="52" rx="8" class="sidebar-active"/>
  <text x="84" y="258" text-anchor="middle" class="inverse" font-size="17">▤</text>
  <text x="84" y="294" text-anchor="middle" class="inverse" font-size="11" font-weight="700">기보</text>
  <rect x="58" y="326" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="358" text-anchor="middle" class="inverse-muted" font-size="17">◎</text>
  <text x="84" y="394" text-anchor="middle" class="inverse-muted" font-size="11">분석</text>
  <rect x="58" y="816" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="848" text-anchor="middle" class="inverse-muted" font-size="17">⚙</text>
  <text x="84" y="884" text-anchor="middle" class="inverse-muted" font-size="11">설정</text>

  <!-- 상단 현재 기보 정보 -->
  <rect x="160" y="50" width="116" height="36" rx="7" class="button-secondary"/>
  <text x="184" y="73" class="text" font-size="13" font-weight="700">← 목록</text>
  <text x="304" y="68" class="text" font-size="20" font-weight="700">2026-04-24 · 1/2-1/2</text>
  <text x="304" y="88" class="muted" font-size="12">백: 정석 연습 · 흑: 카로칸 대응 · 종료 사유: 합의 무승부</text>
  <rect x="742" y="53" width="112" height="30" rx="15" class="badge-ok"/>
  <circle cx="760" cy="68" r="4" fill="#2d8b57"/>
  <text x="772" y="73" class="text" font-size="12" font-weight="700">정식 저장됨</text>
  <rect x="866" y="53" width="154" height="30" rx="15" class="badge-readonly"/>
  <text x="884" y="73" class="muted" font-size="12" font-weight="700">수순 읽기 전용</text>
  <rect x="1090" y="50" width="132" height="36" rx="7" class="button-quiet"/>
  <text x="1112" y="73" class="muted" font-size="13" font-weight="700">PGN 복사</text>
  <rect x="1234" y="50" width="150" height="36" rx="7" class="button-primary"/>
  <text x="1260" y="73" fill="#ffffff" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700">목록으로 돌아가기</text>

  <!-- 중앙 보드 작업 영역 -->
  <rect x="160" y="128" width="880" height="760" rx="10" fill="#f8fafc" stroke="#d4dae2" stroke-width="1.2"/>
  <text x="190" y="168" class="text" font-size="17" font-weight="700">보드</text>
  <text x="246" y="168" class="muted" font-size="13">선택 수 12...Bb7 이후의 보드 상태를 조회하는 화면</text>
  <rect x="816" y="146" width="190" height="28" rx="14" class="badge-readonly"/>
  <text x="834" y="165" class="muted" font-size="12" font-weight="700">보드 직접 수정 없음</text>

  <g transform="translate(270 190)">
    <rect x="0" y="0" width="640" height="640" rx="6" fill="#ffffff" stroke="#b9c3cf" stroke-width="2"/>
    <rect x="0" y="0" width="640" height="640" fill="url(#board-pattern)"/>

    <!-- 선택 수 12...Bb7: c8에서 b7로 전개된 상태 단서 -->
    <rect x="160" y="0" width="80" height="80" class="last-move"/>
    <rect x="80" y="80" width="80" height="80" class="last-move"/>
    <rect x="80" y="80" width="80" height="80" class="selected-square"/>
    <rect x="82" y="82" width="76" height="76" rx="3" class="selected"/>

    <g class="muted" font-size="11">
      <text x="10" y="22">8</text><text x="10" y="102">7</text><text x="10" y="182">6</text><text x="10" y="262">5</text>
      <text x="10" y="342">4</text><text x="10" y="422">3</text><text x="10" y="502">2</text><text x="10" y="582">1</text>
      <text x="38" y="628">a</text><text x="118" y="628">b</text><text x="198" y="628">c</text><text x="278" y="628">d</text>
      <text x="358" y="628">e</text><text x="438" y="628">f</text><text x="518" y="628">g</text><text x="598" y="628">h</text>
    </g>

    <g font-size="28" text-anchor="middle" dominant-baseline="middle" opacity="0.9">
      <circle cx="40" cy="40" r="26" class="piece-dark"/><text x="40" y="42" class="piece-label-dark">R</text>
      <circle cx="280" cy="40" r="26" class="piece-dark"/><text x="280" y="42" class="piece-label-dark">Q</text>
      <circle cx="360" cy="40" r="26" class="piece-dark"/><text x="360" y="42" class="piece-label-dark">K</text>
      <circle cx="600" cy="40" r="26" class="piece-dark"/><text x="600" y="42" class="piece-label-dark">R</text>
      <circle cx="120" cy="120" r="26" class="piece-dark"/><text x="120" y="122" class="piece-label-dark">B</text>
      <circle cx="40" cy="120" r="22" class="piece-dark"/><text x="40" y="122" class="piece-label-dark">P</text>
      <circle cx="200" cy="120" r="22" class="piece-dark"/><text x="200" y="122" class="piece-label-dark">P</text>
      <circle cx="360" cy="120" r="22" class="piece-dark"/><text x="360" y="122" class="piece-label-dark">P</text>
      <circle cx="440" cy="120" r="22" class="piece-dark"/><text x="440" y="122" class="piece-label-dark">P</text>
      <circle cx="520" cy="120" r="22" class="piece-dark"/><text x="520" y="122" class="piece-label-dark">P</text>
      <circle cx="600" cy="120" r="22" class="piece-dark"/><text x="600" y="122" class="piece-label-dark">P</text>
      <circle cx="200" cy="200" r="28" class="piece-dark"/><text x="200" y="202" class="piece-label-dark">N</text>
      <circle cx="360" cy="280" r="22" class="piece-light"/><text x="360" y="282" class="piece-label-light">P</text>
      <circle cx="240" cy="360" r="22" class="piece-light"/><text x="240" y="362" class="piece-label-light">P</text>
      <circle cx="160" cy="440" r="28" class="piece-light"/><text x="160" y="442" class="piece-label-light">N</text>
      <circle cx="320" cy="440" r="28" class="piece-light"/><text x="320" y="442" class="piece-label-light">B</text>
      <circle cx="40" cy="520" r="22" class="piece-light"/><text x="40" y="522" class="piece-label-light">P</text>
      <circle cx="80" cy="520" r="22" class="piece-light"/><text x="80" y="522" class="piece-label-light">P</text>
      <circle cx="400" cy="520" r="22" class="piece-light"/><text x="400" y="522" class="piece-label-light">P</text>
      <circle cx="440" cy="520" r="22" class="piece-light"/><text x="440" y="522" class="piece-label-light">P</text>
      <circle cx="520" cy="520" r="22" class="piece-light"/><text x="520" y="522" class="piece-label-light">P</text>
      <circle cx="600" cy="520" r="22" class="piece-light"/><text x="600" y="522" class="piece-label-light">P</text>
      <circle cx="40" cy="600" r="26" class="piece-light"/><text x="40" y="602" class="piece-label-light">R</text>
      <circle cx="280" cy="600" r="26" class="piece-light"/><text x="280" y="602" class="piece-label-light">Q</text>
      <circle cx="360" cy="600" r="26" class="piece-light"/><text x="360" y="602" class="piece-label-light">K</text>
      <circle cx="600" cy="600" r="26" class="piece-light"/><text x="600" y="602" class="piece-label-light">R</text>
    </g>
  </g>

  <rect x="270" y="836" width="640" height="52" rx="7" fill="#ffffff" stroke="#dbe1e8"/>
  <text x="292" y="854" class="muted" font-size="11" font-weight="700">조회 상태 단서</text>
  <rect x="292" y="862" width="14" height="10" class="last-move"/>
  <text x="312" y="872" class="muted" font-size="10">현재 선택 수의 출발/도착 칸</text>
  <rect x="456" y="862" width="14" height="10" class="selected-square"/>
  <text x="476" y="872" class="muted" font-size="10">선택된 도착 칸</text>
  <rect x="594" y="862" width="14" height="10" class="light-square"/>
  <text x="614" y="872" class="muted" font-size="10">밝은 칸 #eef0df</text>
  <rect x="720" y="862" width="14" height="10" class="dark-square"/>
  <text x="740" y="872" class="muted" font-size="10">어두운 칸 #8ca07c</text>
  <text x="292" y="888" class="muted" font-size="10">정식 기보 상세 화면에서는 보드 클릭이 수순 선택 이동에만 연결되고 기보 자체는 변경하지 않는다.</text>

  <!-- 우측 상세 패널 -->
  <rect x="1064" y="128" width="308" height="760" rx="10" class="panel"/>
  <text x="1090" y="166" class="text" font-size="18" font-weight="700">기보 상세</text>
  <text x="1090" y="190" class="muted" font-size="12">FEATURE-003과 같은 수순 목록 + 메타데이터 탭 구조</text>

  <rect x="1090" y="214" width="256" height="342" rx="8" class="subpanel"/>
  <text x="1110" y="244" class="text" font-size="15" font-weight="700">수순 목록</text>
  <text x="1216" y="244" class="muted" font-size="12">SAN</text>
  <rect x="1248" y="228" width="74" height="24" rx="12" class="badge-readonly"/>
  <text x="1262" y="245" class="muted" font-size="11" font-weight="700">읽기 전용</text>
  <line x1="1110" y1="262" x2="1326" y2="262" class="line"/>
  <text x="1122" y="286" class="muted" font-size="11">#</text>
  <text x="1164" y="286" class="muted" font-size="11">백</text>
  <text x="1248" y="286" class="muted" font-size="11">흑</text>
  <line x1="1230" y1="296" x2="1230" y2="466" class="line"/>

  <rect x="1110" y="306" width="216" height="34" rx="6" class="move-cell"/>
  <text x="1124" y="328" class="text" font-size="13" font-weight="700">1.</text>
  <text x="1164" y="328" class="text" font-size="13">d4</text>
  <text x="1248" y="328" class="text" font-size="13">Nf6</text>
  <rect x="1110" y="348" width="216" height="34" rx="6" class="move-cell"/>
  <text x="1124" y="370" class="text" font-size="13" font-weight="700">2.</text>
  <text x="1164" y="370" class="text" font-size="13">c4</text>
  <text x="1248" y="370" class="text" font-size="13">e6</text>
  <rect x="1110" y="390" width="216" height="34" rx="6" class="move-cell-muted"/>
  <text x="1124" y="412" class="muted" font-size="13" font-weight="700">...</text>
  <text x="1164" y="412" class="muted" font-size="13">중간 수순</text>
  <text x="1248" y="412" class="muted" font-size="13">접기</text>
  <rect x="1110" y="432" width="216" height="38" rx="6" class="move-cell-active"/>
  <text x="1124" y="456" class="text" font-size="13" font-weight="700">12.</text>
  <text x="1164" y="456" class="text" font-size="13" font-weight="700">Re1</text>
  <text x="1248" y="456" class="text" font-size="13" font-weight="700">Bb7</text>
  <rect x="1110" y="482" width="216" height="24" rx="12" class="badge-readonly"/>
  <text x="1124" y="499" class="muted" font-size="11">수순 추가, 삭제, SAN 수정 컨트롤 없음</text>
  <rect x="1110" y="518" width="216" height="18" rx="9" class="badge"/>
  <text x="1122" y="531" class="muted" font-size="11">선택 수: 12...Bb7</text>

  <rect x="1090" y="580" width="256" height="282" rx="8" class="subpanel"/>
  <g aria-label="메타데이터 탭">
    <rect x="1110" y="598" width="44" height="28" rx="7" fill="#ffffff" stroke="#bcc7d4"/>
    <text x="1121" y="617" class="muted" font-size="12" font-weight="700">SAN</text>
    <rect x="1158" y="598" width="62" height="28" rx="7" fill="#2f5f73"/>
    <text x="1172" y="617" fill="#ffffff" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="12" font-weight="700">코멘트</text>
    <rect x="1224" y="598" width="48" height="28" rx="7" fill="#ffffff" stroke="#bcc7d4"/>
    <text x="1236" y="617" class="muted" font-size="12" font-weight="700">평가</text>
    <rect x="1276" y="598" width="58" height="28" rx="7" fill="#ffffff" stroke="#bcc7d4"/>
    <text x="1283" y="617" class="muted" font-size="11" font-weight="700">기보 정보</text>
  </g>
  <text x="1110" y="654" class="text" font-size="15" font-weight="700">선택 수 코멘트</text>
  <rect x="1110" y="674" width="216" height="52" rx="7" fill="#ffffff" stroke="#dbe1e8"/>
  <text x="1124" y="698" class="text" font-size="12">흑이 장기 대각선 압박을 준비한다.</text>
  <text x="1124" y="718" class="muted" font-size="11">읽기 전용 저장 코멘트</text>
  <text x="1110" y="760" class="text" font-size="15" font-weight="700">평가</text>
  <rect x="1110" y="780" width="58" height="28" rx="14" class="badge"/>
  <text x="1128" y="799" class="text" font-size="12" font-weight="700">=</text>
  <rect x="1178" y="780" width="148" height="28" rx="14" class="badge"/>
  <text x="1194" y="799" class="text" font-size="12" font-weight="700">+0.2 · 균형 유지</text>
  <text x="1110" y="830" class="muted" font-size="11">FEATURE-003 탭 위치를 유지하되 정식 기보 값은 조회만 가능</text>

  <!-- 설계 메모 -->
  <rect x="160" y="904" width="1212" height="22" rx="5" fill="#eef2f6"/>
  <text x="176" y="919" class="muted" font-size="11">구현 후보 메모: FEATURE-003의 88px 전역 사이드바, 64px 상단 바, 중앙 보드, 우측 수순 목록 + SAN/코멘트/평가/기보 정보 탭 구조를 유지한다. FEATURE-005 상세는 같은 구조에서 수순과 메타데이터를 조회 전용으로 잠근다.</text>
</svg>
