<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">EPIC-001 전체 UI 정보구조와 화면 전환 지도</title>
  <desc id="desc">EPIC-001 저장소 내부 화면에서 좌측 전역 사이드바는 유지되고, 분석 보드 뷰, 기보 목록 뷰, 새 기보 입력 뷰, 기보 상세 뷰가 메인 영역에서 전환되는 전체 흐름을 설명하는 SVG 와이어프레임이다. Feature별 상세 UI는 별도 SVG로 분리한다.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#496a7a"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
    <style>
      .page { fill: #f5f7fa; }
      .frame { fill: #ffffff; stroke: #cfd7e2; stroke-width: 1; }
      .topbar { fill: #f9fafb; stroke: #d7dde5; stroke-width: 1; }
      .sidebar { fill: #26343d; }
      .sidebar-active { fill: #385868; }
      .main-shell { fill: #f8fafc; stroke: #d7dde5; stroke-width: 1; }
      .view-card { fill: #ffffff; stroke: #cfd7e2; stroke-width: 1; }
      .view-muted { fill: #f1f5f9; stroke: #d7dde5; stroke-width: 1; }
      .panel { fill: #ffffff; stroke: #cfd7e2; stroke-width: 1; }
      .board-light { fill: #e8edf2; }
      .board-dark { fill: #9aa7b5; }
      .chip { fill: #eef5f8; stroke: #b9cbd5; stroke-width: 1; }
      .flow { fill: none; stroke: #496a7a; stroke-width: 2; marker-end: url(#arrow); }
      .flow-soft { fill: none; stroke: #98aeb8; stroke-width: 1.5; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .label { font-family: Arial, 'Noto Sans KR', sans-serif; fill: #1f2937; }
      .muted { font-family: Arial, 'Noto Sans KR', sans-serif; fill: #667085; }
      .white { font-family: Arial, 'Noto Sans KR', sans-serif; fill: #ffffff; }
      .small { font-size: 12px; }
    </style>
  </defs>

  <rect width="1440" height="980" class="page"/>

  <text x="64" y="58" class="label" font-size="24" font-weight="700">EPIC-001 저장소 내부 UI 지도</text>
  <text x="64" y="84" class="muted" font-size="14">고정 전역 사이드바와 메인 뷰 전환 관계만 표현한다.</text>

  <!-- 공통 앱 shell -->
  <rect x="64" y="116" width="1312" height="748" rx="10" class="frame" filter="url(#soft-shadow)"/>
  <rect x="64" y="116" width="1312" height="54" rx="10" class="topbar"/>
  <rect x="64" y="160" width="1312" height="1" fill="#d7dde5"/>
  <text x="92" y="150" class="label" font-size="17" font-weight="700">저장소: 내 오프닝 학습</text>
  <text x="302" y="150" class="muted" font-size="12">저장소 진입 후 기본 화면은 분석 보드 뷰</text>

  <!-- 좌측 전역 사이드바 -->
  <rect x="64" y="170" width="156" height="694" class="sidebar"/>
  <text x="92" y="206" class="white" font-size="13" font-weight="700">전역 사이드바</text>

  <rect x="82" y="230" width="120" height="44" rx="8" class="sidebar-active"/>
  <circle cx="104" cy="252" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>
  <line x1="111" y1="259" x2="118" y2="266" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="130" y="257" class="white" font-size="14" font-weight="700">분석</text>

  <rect x="82" y="286" width="120" height="44" rx="8" fill="transparent" stroke="#4b5e68"/>
  <rect x="96" y="300" width="18" height="22" rx="2" fill="none" stroke="#d7e0e6" stroke-width="2"/>
  <line x1="100" y1="307" x2="110" y2="307" stroke="#d7e0e6" stroke-width="1.5"/>
  <line x1="100" y1="314" x2="110" y2="314" stroke="#d7e0e6" stroke-width="1.5"/>
  <text x="130" y="314" class="white" font-size="14">기보</text>

  <rect x="82" y="342" width="120" height="44" rx="8" fill="transparent" stroke="#4b5e68"/>
  <line x1="105" y1="354" x2="105" y2="374" stroke="#d7e0e6" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="95" y1="364" x2="115" y2="364" stroke="#d7e0e6" stroke-width="2.3" stroke-linecap="round"/>
  <text x="130" y="370" class="white" font-size="14">새 기보</text>

  <rect x="82" y="398" width="120" height="44" rx="8" fill="transparent" stroke="#4b5e68"/>
  <circle cx="103" cy="418" r="8" fill="none" stroke="#d7e0e6" stroke-width="2"/>
  <line x1="109" y1="424" x2="117" y2="432" stroke="#d7e0e6" stroke-width="2" stroke-linecap="round"/>
  <text x="130" y="426" class="white" font-size="14">검색</text>

  <rect x="82" y="790" width="120" height="44" rx="8" fill="#31444e"/>
  <text x="100" y="816" class="white" font-size="12">사이드바는 유지</text>

  <!-- 메인 정보구조 지도 -->
  <rect x="244" y="194" width="1094" height="610" rx="8" class="main-shell"/>
  <text x="272" y="226" class="label" font-size="17" font-weight="700">메인 뷰 전환 구조</text>
  <text x="272" y="249" class="muted" font-size="12">좌측 메뉴 선택 또는 목록 항목 선택으로 오른쪽 메인 영역만 바뀐다.</text>

  <!-- 분석 보드 뷰 -->
  <g id="analysis-view">
    <rect x="272" y="282" width="300" height="216" rx="8" class="view-card"/>
    <rect x="272" y="282" width="300" height="34" rx="8" fill="#eef5f8" stroke="#cfd7e2"/>
    <text x="292" y="304" class="label" font-size="14" font-weight="700">분석 보드 뷰</text>
    <text x="452" y="304" class="muted" font-size="11">기본 진입</text>
    <rect x="294" y="338" width="126" height="126" rx="6" fill="#eef2f6" stroke="#9aa7b5"/>
    <g transform="translate(304 348)">
      <rect x="0" y="0" width="26" height="26" class="board-light"/>
      <rect x="26" y="0" width="26" height="26" class="board-dark"/>
      <rect x="52" y="0" width="26" height="26" class="board-light"/>
      <rect x="78" y="0" width="26" height="26" class="board-dark"/>
      <rect x="0" y="26" width="26" height="26" class="board-dark"/>
      <rect x="26" y="26" width="26" height="26" class="board-light"/>
      <rect x="52" y="26" width="26" height="26" class="board-dark"/>
      <rect x="78" y="26" width="26" height="26" class="board-light"/>
      <rect x="0" y="52" width="26" height="26" class="board-light"/>
      <rect x="26" y="52" width="26" height="26" class="board-dark"/>
      <rect x="52" y="52" width="26" height="26" class="board-light"/>
      <rect x="78" y="52" width="26" height="26" class="board-dark"/>
      <rect x="0" y="78" width="26" height="26" class="board-dark"/>
      <rect x="26" y="78" width="26" height="26" class="board-light"/>
      <rect x="52" y="78" width="26" height="26" class="board-dark"/>
      <rect x="78" y="78" width="26" height="26" class="board-light"/>
    </g>
    <rect x="442" y="338" width="104" height="126" rx="6" class="panel"/>
    <text x="460" y="365" class="label small" font-weight="700">우측 패널</text>
    <text x="460" y="389" class="muted small">현재 선택</text>
    <text x="460" y="410" class="muted small">상세 담당</text>
    <rect x="292" y="476" width="82" height="18" rx="9" class="chip"/>
    <text x="307" y="489" class="muted" font-size="10">FEATURE-006</text>
  </g>

  <!-- 기보 목록 뷰 -->
  <g id="game-list-view">
    <rect x="700" y="282" width="300" height="216" rx="8" class="view-card"/>
    <rect x="700" y="282" width="300" height="34" rx="8" fill="#f1f5f9" stroke="#cfd7e2"/>
    <text x="720" y="304" class="label" font-size="14" font-weight="700">기보 목록 뷰</text>
    <text x="720" y="333" class="muted small">사이드바의 기보 선택</text>
    <rect x="722" y="354" width="250" height="36" rx="6" fill="#ffffff" stroke="#cfd7e2"/>
    <text x="738" y="377" class="label small">2026-04-12 · 백승</text>
    <rect x="722" y="400" width="250" height="36" rx="6" fill="#eef5f8" stroke="#9db7c4"/>
    <text x="738" y="423" class="label small" font-weight="700">2026-04-18 · 무승부</text>
    <rect x="722" y="446" width="250" height="36" rx="6" fill="#ffffff" stroke="#cfd7e2"/>
    <text x="738" y="469" class="label small">2026-04-21 · 흑승</text>
    <rect x="720" y="476" width="82" height="18" rx="9" class="chip"/>
    <text x="735" y="489" class="muted" font-size="10">FEATURE-005</text>
  </g>

  <!-- 새 기보 입력 뷰 -->
  <g id="new-game-view">
    <rect x="272" y="552" width="300" height="216" rx="8" class="view-card"/>
    <rect x="272" y="552" width="300" height="34" rx="8" fill="#f8f2ea" stroke="#d8c8b4"/>
    <text x="292" y="574" class="label" font-size="14" font-weight="700">새 기보 입력 뷰</text>
    <text x="292" y="604" class="muted small">사이드바의 새 기보 선택</text>
    <rect x="294" y="624" width="126" height="96" rx="6" fill="#eef2f6" stroke="#9aa7b5"/>
    <text x="324" y="676" class="label small" font-weight="700">입력 보드</text>
    <rect x="442" y="624" width="104" height="96" rx="6" class="view-muted"/>
    <text x="462" y="657" class="label small" font-weight="700">수순</text>
    <text x="462" y="679" class="muted small">초안</text>
    <text x="462" y="700" class="muted small">저장</text>
    <rect x="292" y="738" width="82" height="18" rx="9" class="chip"/>
    <text x="307" y="751" class="muted" font-size="10">FEATURE-002</text>
    <rect x="382" y="738" width="82" height="18" rx="9" class="chip"/>
    <text x="397" y="751" class="muted" font-size="10">FEATURE-003</text>
  </g>

  <!-- 기보 상세 뷰 -->
  <g id="game-detail-view">
    <rect x="700" y="552" width="300" height="216" rx="8" class="view-card"/>
    <rect x="700" y="552" width="300" height="34" rx="8" fill="#eef5f8" stroke="#cfd7e2"/>
    <text x="720" y="574" class="label" font-size="14" font-weight="700">기보 상세 뷰</text>
    <text x="720" y="604" class="muted small">목록에서 기보 선택</text>
    <rect x="722" y="624" width="126" height="96" rx="6" fill="#eef2f6" stroke="#9aa7b5"/>
    <text x="756" y="676" class="label small" font-weight="700">보드</text>
    <rect x="870" y="624" width="104" height="96" rx="6" class="panel"/>
    <text x="888" y="653" class="label small" font-weight="700">우측 패널</text>
    <text x="888" y="675" class="muted small">선택 수</text>
    <text x="888" y="696" class="muted small">코멘트</text>
    <rect x="720" y="738" width="82" height="18" rx="9" class="chip"/>
    <text x="735" y="751" class="muted" font-size="10">FEATURE-005</text>
  </g>

  <!-- 전환 흐름 -->
  <path d="M 202 252 C 230 252 238 314 272 314" class="flow-soft"/>
  <text x="226" y="276" class="muted" font-size="11">분석</text>

  <path d="M 202 310 C 510 236 620 300 700 330" class="flow"/>
  <text x="418" y="270" class="label" font-size="12" font-weight="700">기보 누름: 목록 뷰 전환</text>

  <path d="M 202 366 C 236 470 240 560 272 606" class="flow"/>
  <text x="224" y="512" class="label" font-size="12" font-weight="700">새 기보</text>

  <path d="M 850 498 L 850 552" class="flow"/>
  <text x="872" y="529" class="label" font-size="12" font-weight="700">기보 선택</text>

  <path d="M 572 660 C 626 660 646 660 700 660" class="flow-soft"/>
  <text x="594" y="641" class="muted" font-size="11">정식 저장 후 상세로</text>

  <path d="M 848 720 C 796 790 570 792 422 498" class="flow-soft"/>
  <text x="610" y="800" class="muted" font-size="11">상세 포지션을 분석으로 넘기는 흐름은 Feature에서 상세화</text>

  <!-- Feature SVG 분리 라벨 -->
  <rect x="1042" y="292" width="252" height="176" rx="8" fill="#ffffff" stroke="#cfd7e2"/>
  <text x="1064" y="326" class="label" font-size="15" font-weight="700">상세 SVG 분리</text>
  <text x="1064" y="356" class="muted small">FEATURE-004: 저장소 진입</text>
  <text x="1064" y="382" class="muted small">FEATURE-005: 목록과 상세</text>
  <text x="1064" y="408" class="muted small">FEATURE-006: 분석 보드</text>
  <text x="1064" y="434" class="muted small">FEATURE-002/003: 새 기보 입력</text>

  <!-- 범례 및 메모 -->
  <rect x="1042" y="522" width="252" height="206" rx="8" fill="#ffffff" stroke="#cfd7e2"/>
  <text x="1064" y="556" class="label" font-size="15" font-weight="700">메모</text>
  <rect x="1064" y="578" width="26" height="14" rx="7" class="chip"/>
  <text x="1102" y="590" class="muted small">Feature 상세는 별도 파일</text>
  <line x1="1064" y1="616" x2="1094" y2="616" class="flow"/>
  <text x="1102" y="620" class="muted small">주요 화면 전환</text>
  <line x1="1064" y1="646" x2="1094" y2="646" class="flow-soft"/>
  <text x="1102" y="650" class="muted small">보조 연결 흐름</text>
  <rect x="1064" y="674" width="52" height="32" rx="6" class="panel"/>
  <text x="1128" y="695" class="muted small">우측 패널은 보드 워크스페이스에서만 사용</text>

  <text x="64" y="910" class="muted" font-size="12">범위 밖: 각 Feature의 폼 필드, 통계 표 세부 구성, 실제 체스 기물, 검색 결과 상세. 이 SVG는 EPIC-001 전체 정보구조와 전환 지도만 고정한다.</text>
</svg>
