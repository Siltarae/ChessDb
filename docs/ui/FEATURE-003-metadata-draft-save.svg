  <text x="1122" y="324" class="muted" font-size="11">#</text>
  <text x="1164" y="324" class="muted" font-size="11">백</text>
  <text x="1248" y="324" class="muted" font-size="11">흑</text>
  <line x1="1230" y1="334" x2="1230" y2="414" class="line"/>
  <rect x="1110" y="342" width="216" height="38" rx="6" fill="#ffffff" stroke="#dbe1e8"/>
