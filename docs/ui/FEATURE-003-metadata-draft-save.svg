<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">FEATURE-003 기보 메타데이터와 초안 저장 목업</title>
  <desc id="desc">FEATURE-002의 새 기보 입력 화면 구조와 색상 톤을 유지하면서 우측 패널 상단에는 백/흑 2열 수순 목록, 마지막 착수 하이라이트, 소형 되돌리기와 다시하기를 배치하고, 하단에는 SAN, 코멘트, 평가, 기보 정보 탭을 하나의 메타데이터 확장 영역으로 묶은 중간 충실도 SVG 목업이다. SAN은 별도 섹션이 아니라 활성 탭 내용으로 표시하며, 상단 바에는 초안 저장 상태, 정식 저장, 초안 폐기, 새 기보 액션을 함께 배치한다.</desc>

  <defs>
    <style>
      .page { fill: #f4f6f8; }
      .surface { fill: #ffffff; }
      .topbar { fill: #fbfcfd; }
      .sidebar { fill: #17202a; }
      .sidebar-soft { fill: #22303d; }
      .panel { fill: #ffffff; stroke: #d4dae2; stroke-width: 1.2; }
      .subpanel { fill: #f8fafc; stroke: #dbe1e8; stroke-width: 1; }
      .line { stroke: #dbe1e8; stroke-width: 1; }
      .text { fill: #15171a; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .muted { fill: #687381; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse { fill: #f8fafc; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse-muted { fill: #aeb8c4; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .button-primary { fill: #2f5f73; }
      .button-secondary { fill: #ffffff; stroke: #bcc7d4; stroke-width: 1; }
      .button-danger { fill: #fff5f2; stroke: #e6b5aa; stroke-width: 1; }
      .button-quiet { fill: #eef2f6; stroke: #d7dde5; stroke-width: 1; }
      .light-square { fill: #eef0df; }
      .dark-square { fill: #8ca07c; }
      .last-move { fill: #f5c542; opacity: 0.46; }
      .move-cell-active { fill: #dff0ea; stroke: #72a897; stroke-width: 1.2; }
      .selected-square { fill: #7dd3fc; opacity: 0.34; }
      .selected { fill: none; stroke: #0f766e; stroke-width: 2.2; opacity: 0.62; }
      .piece-light { fill: #fbfbfb; stroke: #20242a; stroke-width: 1.4; }
      .piece-dark { fill: #20242a; stroke: #20242a; stroke-width: 1.4; }
      .piece-label-light { fill: #20242a; font-family: Georgia, serif; font-weight: 700; }
      .piece-label-dark { fill: #ffffff; font-family: Georgia, serif; font-weight: 700; }
      .badge { fill: #eef4f7; stroke: #c8d6df; stroke-width: 1; }
      .badge-ok { fill: #e8f5ee; stroke: #9fcbb2; stroke-width: 1; }
      .badge-warn { fill: #fff7e6; stroke: #f0c36a; stroke-width: 1; }
      .field { fill: #ffffff; stroke: #bcc7d4; stroke-width: 1; }
      .field-focus { fill: #ffffff; stroke: #2f5f73; stroke-width: 1.4; }
      .active-chip { fill: #dff0ea; stroke: #72a897; stroke-width: 1.2; }
      .warning-note { fill: #fff7e6; stroke: #f0c36a; stroke-width: 1; }
    </style>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.11"/>
    </filter>
    <pattern id="board-pattern" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" class="light-square"/>
      <rect x="80" y="0" width="80" height="80" class="dark-square"/>
      <rect x="0" y="80" width="80" height="80" class="dark-square"/>
    </pattern>
  </defs>

  <rect width="1440" height="980" class="page"/>

  <!-- 전역 앱 프레임: FEATURE-002와 같은 구조 -->
  <rect x="40" y="36" width="1360" height="900" rx="12" class="surface" filter="url(#soft-shadow)"/>
  <rect x="40" y="36" width="88" height="900" rx="12" class="sidebar"/>
  <rect x="128" y="36" width="1272" height="64" class="topbar"/>
  <line x1="128" y1="100" x2="1400" y2="100" class="line"/>
  <line x1="128" y1="36" x2="128" y2="936" stroke="#293746" stroke-width="1"/>

  <!-- 좌측 전역 사이드바 -->
  <text x="84" y="78" text-anchor="middle" class="inverse" font-size="18" font-weight="700">CDB</text>
  <rect x="58" y="126" width="52" height="52" rx="8" fill="#2f5f73"/>
  <text x="84" y="158" text-anchor="middle" class="inverse" font-size="18" font-weight="700">＋</text>
  <text x="84" y="194" text-anchor="middle" class="inverse-muted" font-size="11">입력</text>
  <rect x="58" y="226" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="258" text-anchor="middle" class="inverse-muted" font-size="17">▤</text>
  <text x="84" y="294" text-anchor="middle" class="inverse-muted" font-size="11">기보</text>
  <rect x="58" y="326" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="358" text-anchor="middle" class="inverse-muted" font-size="17">◎</text>
  <text x="84" y="394" text-anchor="middle" class="inverse-muted" font-size="11">분석</text>
  <rect x="58" y="816" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="848" text-anchor="middle" class="inverse-muted" font-size="17">⚙</text>
  <text x="84" y="884" text-anchor="middle" class="inverse-muted" font-size="11">설정</text>

  <!-- 상단 바: 초안 저장 상태와 저장 액션 중심 -->
  <text x="164" y="69" class="text" font-size="20" font-weight="700">새 기보 입력</text>
  <text x="294" y="69" class="muted" font-size="13">수순 패널 아래에 메모와 기보 정보를 붙여 저장하는 작업 화면</text>
  <rect x="690" y="53" width="132" height="30" rx="15" class="badge-ok"/>
  <circle cx="708" cy="68" r="4" fill="#2d8b57"/>
  <text x="720" y="73" class="text" font-size="12" font-weight="700">초안 저장됨</text>
  <rect x="834" y="53" width="138" height="30" rx="15" class="badge"/>
  <text x="852" y="73" class="muted" font-size="12">마지막 14:32</text>
  <rect x="984" y="53" width="148" height="30" rx="15" class="badge-warn"/>
  <text x="1002" y="73" class="muted" font-size="12">새로고침 복원</text>
  <rect x="1148" y="50" width="82" height="36" rx="7" class="button-primary"/>
  <text x="1163" y="73" fill="#ffffff" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700">정식 저장</text>
  <rect x="1242" y="50" width="82" height="36" rx="7" class="button-danger"/>
  <text x="1257" y="73" fill="#9b3327" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700">초안 폐기</text>
  <rect x="1334" y="50" width="50" height="36" rx="7" class="button-secondary"/>
  <text x="1347" y="73" class="text" font-size="13" font-weight="700">새 기보</text>

  <!-- 중앙 보드 작업 영역: FEATURE-002와 같은 새 기보 입력 맥락 -->
  <rect x="160" y="128" width="880" height="760" rx="10" fill="#f8fafc" stroke="#d4dae2" stroke-width="1.2"/>
  <text x="190" y="168" class="text" font-size="17" font-weight="700">보드</text>
  <text x="246" y="168" class="muted" font-size="13">새 기보 입력 화면의 보드와 마지막 이동 표시를 그대로 유지</text>

  <g transform="translate(270 190)">
    <rect x="0" y="0" width="640" height="640" rx="6" fill="#ffffff" stroke="#b9c3cf" stroke-width="2"/>
    <rect x="0" y="0" width="640" height="640" fill="url(#board-pattern)"/>

    <!-- 선택 수 12. Bxe6의 출발/도착 맥락 -->
    <rect x="400" y="400" width="80" height="80" class="last-move"/>
    <rect x="320" y="160" width="80" height="80" class="last-move"/>
    <rect x="320" y="160" width="80" height="80" class="selected-square"/>
    <rect x="322" y="162" width="76" height="76" rx="3" class="selected"/>

    <!-- 좌표 라벨 -->
    <g class="muted" font-size="11">
      <text x="10" y="22">8</text><text x="10" y="102">7</text><text x="10" y="182">6</text><text x="10" y="262">5</text>
      <text x="10" y="342">4</text><text x="10" y="422">3</text><text x="10" y="502">2</text><text x="10" y="582">1</text>
      <text x="38" y="628">a</text><text x="118" y="628">b</text><text x="198" y="628">c</text><text x="278" y="628">d</text>
      <text x="358" y="628">e</text><text x="438" y="628">f</text><text x="518" y="628">g</text><text x="598" y="628">h</text>
    </g>

    <!-- 기물은 맥락 표시 수준으로 단순화 -->
    <g font-size="28" text-anchor="middle" dominant-baseline="middle" opacity="0.88">
      <g>
        <circle cx="40" cy="40" r="26" class="piece-dark"/><text x="40" y="42" class="piece-label-dark">R</text>
        <circle cx="200" cy="40" r="26" class="piece-dark"/><text x="200" y="42" class="piece-label-dark">B</text>
        <circle cx="280" cy="40" r="26" class="piece-dark"/><text x="280" y="42" class="piece-label-dark">Q</text>
        <circle cx="360" cy="40" r="26" class="piece-dark"/><text x="360" y="42" class="piece-label-dark">K</text>
        <circle cx="600" cy="40" r="26" class="piece-dark"/><text x="600" y="42" class="piece-label-dark">R</text>
      </g>
      <g>
        <circle cx="40" cy="120" r="22" class="piece-dark"/><text x="40" y="122" class="piece-label-dark">P</text>
        <circle cx="120" cy="120" r="22" class="piece-dark"/><text x="120" y="122" class="piece-label-dark">P</text>
        <circle cx="200" cy="120" r="22" class="piece-dark"/><text x="200" y="122" class="piece-label-dark">P</text>
        <circle cx="440" cy="120" r="22" class="piece-dark"/><text x="440" y="122" class="piece-label-dark">P</text>
        <circle cx="520" cy="120" r="22" class="piece-dark"/><text x="520" y="122" class="piece-label-dark">P</text>
        <circle cx="600" cy="120" r="22" class="piece-dark"/><text x="600" y="122" class="piece-label-dark">P</text>
      </g>
      <g>
        <circle cx="360" cy="200" r="28" class="piece-light"/><text x="360" y="202" class="piece-label-light">B</text>
        <circle cx="360" cy="360" r="22" class="piece-light"/><text x="360" y="362" class="piece-label-light">P</text>
        <circle cx="440" cy="440" r="28" class="piece-light"/><text x="440" y="442" class="piece-label-light">B</text>
      </g>
      <g>
        <circle cx="40" cy="520" r="22" class="piece-light"/><text x="40" y="522" class="piece-label-light">P</text>
        <circle cx="120" cy="520" r="22" class="piece-light"/><text x="120" y="522" class="piece-label-light">P</text>
        <circle cx="200" cy="520" r="22" class="piece-light"/><text x="200" y="522" class="piece-label-light">P</text>
        <circle cx="520" cy="520" r="22" class="piece-light"/><text x="520" y="522" class="piece-label-light">P</text>
        <circle cx="600" cy="520" r="22" class="piece-light"/><text x="600" y="522" class="piece-label-light">P</text>
      </g>
      <g>
        <circle cx="40" cy="600" r="26" class="piece-light"/><text x="40" y="602" class="piece-label-light">R</text>
        <circle cx="280" cy="600" r="26" class="piece-light"/><text x="280" y="602" class="piece-label-light">Q</text>
        <circle cx="360" cy="600" r="26" class="piece-light"/><text x="360" y="602" class="piece-label-light">K</text>
        <circle cx="600" cy="600" r="26" class="piece-light"/><text x="600" y="602" class="piece-label-light">R</text>
      </g>
    </g>
  </g>

  <rect x="270" y="836" width="640" height="52" rx="7" fill="#ffffff" stroke="#dbe1e8"/>
  <text x="292" y="854" class="muted" font-size="11" font-weight="700">색상 메모</text>
  <rect x="292" y="862" width="14" height="10" class="light-square"/>
