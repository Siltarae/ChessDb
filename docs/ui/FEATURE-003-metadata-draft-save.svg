  <!-- 설계 메모 -->
  <rect x="160" y="904" width="1212" height="22" rx="5" fill="#eef2f6"/>
  <text x="176" y="919" class="muted" font-size="11">구현 후보 메모: 우측 패널은 MoveListPanel과 MetadataTabs로 구성. 초안 폐기는 현재 초안 삭제, 새 기보는 확인 후 오늘 날짜가 채워진 새 draft 시작.</text>
</svg>
