  <line x1="1328" y1="342" x2="1328" y2="384" stroke="#9ca8b6" stroke-width="4" stroke-linecap="round"/>
  <text x="1110" y="482" class="muted" font-size="11">첫 착수 전에는 목록 숨김/축약 안내만 표시</text>
  <text x="1110" y="502" class="muted" font-size="11">↶/↷는 작은 보조 액션, 마지막 착수 셀만 강조</text>
  <rect x="1110" y="518" width="216" height="18" rx="9" class="badge"/>
