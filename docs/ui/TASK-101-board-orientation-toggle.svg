<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">TASK-101 기보 입력 보드 시점 토글 목업</title>
  <desc id="desc">기보 입력 화면의 우측 수순 목록 헤더 보조 액션 영역에 보드 시점 전환 아이콘 버튼을 배치하고, 버튼 클릭 시 중앙 보드가 흑 기준으로 뒤집힌 상태를 표현한 구조 목업이다.</desc>
  <defs>
    <style>
      .page { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .muted { fill: #64748b; font-family: Inter, Arial, sans-serif; }
      .text { fill: #0f172a; font-family: Inter, Arial, sans-serif; }
      .light { fill: #e8edf2; }
      .dark { fill: #9aa7b5; }
      .accent { fill: #2563eb; }
      .button { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; }
      .button-disabled { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .chip { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; }
    </style>
  </defs>

  <rect class="page" width="1200" height="760"/>

  <text x="48" y="58" class="text" font-size="26" font-weight="700">기보 입력 보드 시점 토글</text>
  <text x="48" y="86" class="muted" font-size="14">보드 시점은 수순 목록 헤더의 보조 액션에서 바꾸고, 실제 게임 상태와 수순은 유지한다.</text>

  <rect x="56" y="126" width="680" height="576" rx="8" class="panel"/>
  <text x="84" y="164" class="text" font-size="15" font-weight="700">기보 입력 보드 영역</text>
  <text x="218" y="164" class="muted" font-size="12">현재 표시: 흑 기준</text>

  <g transform="translate(140 184)">
    <rect x="0" y="0" width="480" height="480" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
    <g>
      <rect x="0" y="0" width="60" height="60" class="light"/><rect x="60" y="0" width="60" height="60" class="dark"/><rect x="120" y="0" width="60" height="60" class="light"/><rect x="180" y="0" width="60" height="60" class="dark"/><rect x="240" y="0" width="60" height="60" class="light"/><rect x="300" y="0" width="60" height="60" class="dark"/><rect x="360" y="0" width="60" height="60" class="light"/><rect x="420" y="0" width="60" height="60" class="dark"/>
      <rect x="0" y="60" width="60" height="60" class="dark"/><rect x="60" y="60" width="60" height="60" class="light"/><rect x="120" y="60" width="60" height="60" class="dark"/><rect x="180" y="60" width="60" height="60" class="light"/><rect x="240" y="60" width="60" height="60" class="dark"/><rect x="300" y="60" width="60" height="60" class="light"/><rect x="360" y="60" width="60" height="60" class="dark"/><rect x="420" y="60" width="60" height="60" class="light"/>
      <rect x="0" y="120" width="60" height="60" class="light"/><rect x="60" y="120" width="60" height="60" class="dark"/><rect x="120" y="120" width="60" height="60" class="light"/><rect x="180" y="120" width="60" height="60" class="dark"/><rect x="240" y="120" width="60" height="60" class="light"/><rect x="300" y="120" width="60" height="60" class="dark"/><rect x="360" y="120" width="60" height="60" class="light"/><rect x="420" y="120" width="60" height="60" class="dark"/>
      <rect x="0" y="180" width="60" height="60" class="dark"/><rect x="60" y="180" width="60" height="60" class="light"/><rect x="120" y="180" width="60" height="60" class="dark"/><rect x="180" y="180" width="60" height="60" class="light"/><rect x="240" y="180" width="60" height="60" class="dark"/><rect x="300" y="180" width="60" height="60" class="light"/><rect x="360" y="180" width="60" height="60" class="dark"/><rect x="420" y="180" width="60" height="60" class="light"/>
      <rect x="0" y="240" width="60" height="60" class="light"/><rect x="60" y="240" width="60" height="60" class="dark"/><rect x="120" y="240" width="60" height="60" class="light"/><rect x="180" y="240" width="60" height="60" class="dark"/><rect x="240" y="240" width="60" height="60" class="light"/><rect x="300" y="240" width="60" height="60" class="dark"/><rect x="360" y="240" width="60" height="60" class="light"/><rect x="420" y="240" width="60" height="60" class="dark"/>
      <rect x="0" y="300" width="60" height="60" class="dark"/><rect x="60" y="300" width="60" height="60" class="light"/><rect x="120" y="300" width="60" height="60" class="dark"/><rect x="180" y="300" width="60" height="60" class="light"/><rect x="240" y="300" width="60" height="60" class="dark"/><rect x="300" y="300" width="60" height="60" class="light"/><rect x="360" y="300" width="60" height="60" class="dark"/><rect x="420" y="300" width="60" height="60" class="light"/>
      <rect x="0" y="360" width="60" height="60" class="light"/><rect x="60" y="360" width="60" height="60" class="dark"/><rect x="120" y="360" width="60" height="60" class="light"/><rect x="180" y="360" width="60" height="60" class="dark"/><rect x="240" y="360" width="60" height="60" class="light"/><rect x="300" y="360" width="60" height="60" class="dark"/><rect x="360" y="360" width="60" height="60" class="light"/><rect x="420" y="360" width="60" height="60" class="dark"/>
      <rect x="0" y="420" width="60" height="60" class="dark"/><rect x="60" y="420" width="60" height="60" class="light"/><rect x="120" y="420" width="60" height="60" class="dark"/><rect x="180" y="420" width="60" height="60" class="light"/><rect x="240" y="420" width="60" height="60" class="dark"/><rect x="300" y="420" width="60" height="60" class="light"/><rect x="360" y="420" width="60" height="60" class="dark"/><rect x="420" y="420" width="60" height="60" class="light"/>
    </g>
    <text x="16" y="35" class="text" font-size="13" font-weight="700">h1</text>
    <text x="442" y="466" class="text" font-size="13" font-weight="700">a8</text>
    <text x="204" y="252" class="text" font-size="18" font-weight="700">표시 순서 반전</text>
  </g>

  <rect x="780" y="126" width="360" height="576" rx="8" class="panel"/>
  <g transform="translate(804 150)">
    <rect x="0" y="0" width="312" height="58" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="18" y="35" class="text" font-size="15" font-weight="700">수순 목록</text>
    <g transform="translate(202 15)">
      <rect x="0" y="0" width="28" height="28" rx="6" class="button"/>
      <path d="M8 10h9.5c2.8 0 5 2.2 5 5s-2.2 5-5 5H10" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M11 6 7 10l4 4" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <title>보드 시점 전환</title>
    </g>
    <g transform="translate(238 15)">
      <rect x="0" y="0" width="28" height="28" rx="6" class="button-disabled"/>
      <text x="8" y="20" class="muted" font-size="15">↶</text>
    </g>
    <g transform="translate(274 15)">
      <rect x="0" y="0" width="28" height="28" rx="6" class="button-disabled"/>
      <text x="8" y="20" class="muted" font-size="15">↷</text>
    </g>
  </g>

  <g transform="translate(804 238)">
    <rect x="0" y="0" width="312" height="330" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="5 5"/>
    <text x="24" y="42" class="muted" font-size="13">#</text>
    <text x="86" y="42" class="muted" font-size="13">백</text>
    <text x="210" y="42" class="muted" font-size="13">흑</text>
    <rect x="20" y="66" width="42" height="30" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="34" y="86" class="text" font-size="13">1.</text>
    <rect x="74" y="66" width="100" height="30" rx="5" class="chip"/>
    <text x="100" y="86" class="text" font-size="13">e4</text>
    <rect x="190" y="66" width="100" height="30" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="216" y="86" class="text" font-size="13">e5</text>
  </g>

  <text x="804" y="636" class="muted" font-size="12">아이콘 버튼은 보기 옵션이며, 수순 선택이나 되돌리기 상태를 바꾸지 않는다.</text>
</svg>
