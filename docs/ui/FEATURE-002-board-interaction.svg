<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">FEATURE-002 기보 입력 보드 상호작용 및 수순 관리 목업</title>
  <desc id="desc">좌측 전역 사이드바, 상단 바, 중앙 체스 보드, 우측 상세 패널로 구성한 중간 충실도 SVG 목업이다. 보드에는 예시 착수 후 마지막 수 g8-f6을 표시하고, 우측 패널에는 백 수와 흑 수를 한 줄에 나누는 2열 수순 목록, 마지막 착수 셀 하이라이트, 소형 되돌리기와 다시하기 액션을 배치한다. 수순 목록 아래에는 SAN, 코멘트, 평가, 기보 정보 탭을 둔 보조 영역을 배치하며, FEATURE-002에서는 SAN 탭 안에 SAN 입력칸, 적용 버튼, 최근 SAN 표시를 포함한다. 착수 전 수순 목록은 숨기거나 축약 안내만 보여주는 방향이며, 저장 메타데이터는 FEATURE-003 범위로 분리한다.</desc>

  <defs>
    <style>
      .page { fill: #f4f6f8; }
      .surface { fill: #ffffff; }
      .topbar { fill: #fbfcfd; }
      .sidebar { fill: #17202a; }
      .sidebar-soft { fill: #22303d; }
      .panel { fill: #ffffff; stroke: #d4dae2; stroke-width: 1.2; }
      .subpanel { fill: #f8fafc; stroke: #dbe1e8; stroke-width: 1; }
      .line { stroke: #dbe1e8; stroke-width: 1; }
      .text { fill: #15171a; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .muted { fill: #687381; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse { fill: #f8fafc; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse-muted { fill: #aeb8c4; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .button-primary { fill: #2f5f73; }
      .button-secondary { fill: #ffffff; stroke: #bcc7d4; stroke-width: 1; }
      .button-disabled { fill: #eef2f6; stroke: #d7dde5; stroke-width: 1; }
      .light-square { fill: #eef0df; }
      .dark-square { fill: #8ca07c; }
      .last-move { fill: #f5c542; opacity: 0.46; }
      .move-cell-active { fill: #dff0ea; stroke: #72a897; stroke-width: 1.2; }
      .selected-square { fill: #7dd3fc; opacity: 0.58; }
      .selected { fill: none; stroke: #0f766e; stroke-width: 2.5; opacity: 0.78; }
      .legal-dot { fill: #2563eb; opacity: 0.54; }
      .legal-ring { fill: none; stroke: #2563eb; stroke-width: 4; opacity: 0.70; }
      .piece-light { fill: #fbfbfb; stroke: #20242a; stroke-width: 1.4; }
      .piece-dark { fill: #20242a; stroke: #20242a; stroke-width: 1.4; }
      .piece-label-light { fill: #20242a; font-family: Georgia, serif; font-weight: 700; }
      .piece-label-dark { fill: #ffffff; font-family: Georgia, serif; font-weight: 700; }
      .badge { fill: #eef4f7; stroke: #c8d6df; stroke-width: 1; }
      .warning-note { fill: #fff7e6; stroke: #f0c36a; stroke-width: 1; }
      .field-focus { fill: #ffffff; stroke: #2f5f73; stroke-width: 1.4; }
    </style>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.11"/>
    </filter>
    <pattern id="board-pattern" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" class="light-square"/>
      <rect x="80" y="0" width="80" height="80" class="dark-square"/>
      <rect x="0" y="80" width="80" height="80" class="dark-square"/>
    </pattern>
  </defs>

  <rect width="1440" height="980" class="page"/>

  <!-- 전역 앱 프레임 -->
  <rect x="40" y="36" width="1360" height="900" rx="12" class="surface" filter="url(#soft-shadow)"/>
  <rect x="40" y="36" width="88" height="900" rx="12" class="sidebar"/>
  <rect x="128" y="36" width="1272" height="64" class="topbar"/>
  <line x1="128" y1="100" x2="1400" y2="100" class="line"/>
  <line x1="128" y1="36" x2="128" y2="936" stroke="#293746" stroke-width="1"/>

  <!-- 좌측 전역 사이드바 -->
  <text x="84" y="78" text-anchor="middle" class="inverse" font-size="18" font-weight="700">CDB</text>
  <rect x="58" y="126" width="52" height="52" rx="8" fill="#2f5f73"/>
  <text x="84" y="158" text-anchor="middle" class="inverse" font-size="18" font-weight="700">＋</text>
  <text x="84" y="194" text-anchor="middle" class="inverse-muted" font-size="11">입력</text>
  <rect x="58" y="226" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="258" text-anchor="middle" class="inverse-muted" font-size="17">▤</text>
  <text x="84" y="294" text-anchor="middle" class="inverse-muted" font-size="11">기보</text>
  <rect x="58" y="326" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="358" text-anchor="middle" class="inverse-muted" font-size="17">◎</text>
  <text x="84" y="394" text-anchor="middle" class="inverse-muted" font-size="11">분석</text>
  <rect x="58" y="816" width="52" height="52" rx="8" class="sidebar-soft"/>
  <text x="84" y="848" text-anchor="middle" class="inverse-muted" font-size="17">⚙</text>
  <text x="84" y="884" text-anchor="middle" class="inverse-muted" font-size="11">설정</text>

  <!-- 상단 바 -->
  <text x="164" y="69" class="text" font-size="20" font-weight="700">새 기보 입력</text>
  <text x="294" y="69" class="muted" font-size="13">보드 상호작용과 수순 기록에 집중한 작업 화면</text>
  <rect x="1110" y="54" width="96" height="28" rx="6" class="badge"/>
  <text x="1131" y="73" class="muted" font-size="12">백 차례</text>
  <rect x="1222" y="50" width="72" height="36" rx="7" class="button-secondary"/>
  <text x="1245" y="73" class="text" font-size="13" font-weight="700">초기화</text>
  <rect x="1310" y="50" width="62" height="36" rx="7" class="button-secondary"/>
  <text x="1333" y="73" class="text" font-size="13" font-weight="700">닫기</text>

  <!-- 중앙 보드 작업 영역 -->
  <rect x="160" y="128" width="880" height="760" rx="10" fill="#f8fafc" stroke="#d4dae2" stroke-width="1.2"/>
  <text x="190" y="168" class="text" font-size="17" font-weight="700">보드</text>
  <text x="246" y="168" class="muted" font-size="13">착수 후 마지막 이동과 SAN 기록이 함께 갱신되는 예시 상태</text>

  <g transform="translate(270 190)">
    <rect x="0" y="0" width="640" height="640" rx="6" fill="#ffffff" stroke="#b9c3cf" stroke-width="2"/>
    <rect x="0" y="0" width="640" height="640" fill="url(#board-pattern)"/>

    <!-- 마지막 수 g8-f6 -->
    <rect x="480" y="0" width="80" height="80" class="last-move"/>
    <rect x="400" y="160" width="80" height="80" class="last-move"/>
    <rect x="480" y="560" width="80" height="80" class="selected-square"/>
    <rect x="482" y="562" width="76" height="76" rx="3" class="selected"/>

    <!-- 좌표 라벨 -->
    <g class="muted" font-size="11">
      <text x="10" y="22">8</text><text x="10" y="102">7</text><text x="10" y="182">6</text><text x="10" y="262">5</text>
      <text x="10" y="342">4</text><text x="10" y="422">3</text><text x="10" y="502">2</text><text x="10" y="582">1</text>
      <text x="38" y="628">a</text><text x="118" y="628">b</text><text x="198" y="628">c</text><text x="278" y="628">d</text>
      <text x="358" y="628">e</text><text x="438" y="628">f</text><text x="518" y="628">g</text><text x="598" y="628">h</text>
    </g>

    <!-- 기물: 1. e4 Nf6 이후 상태 -->
    <g font-size="28" text-anchor="middle" dominant-baseline="middle">
      <g>
        <circle cx="40" cy="40" r="26" class="piece-dark"/><text x="40" y="42" class="piece-label-dark">R</text>
        <circle cx="120" cy="40" r="26" class="piece-dark"/><text x="120" y="42" class="piece-label-dark">N</text>
        <circle cx="200" cy="40" r="26" class="piece-dark"/><text x="200" y="42" class="piece-label-dark">B</text>
        <circle cx="280" cy="40" r="26" class="piece-dark"/><text x="280" y="42" class="piece-label-dark">Q</text>
        <circle cx="360" cy="40" r="26" class="piece-dark"/><text x="360" y="42" class="piece-label-dark">K</text>
        <circle cx="440" cy="40" r="26" class="piece-dark"/><text x="440" y="42" class="piece-label-dark">B</text>
        <circle cx="600" cy="40" r="26" class="piece-dark"/><text x="600" y="42" class="piece-label-dark">R</text>
      </g>
      <g>
        <circle cx="40" cy="120" r="22" class="piece-dark"/><text x="40" y="122" class="piece-label-dark">P</text>
        <circle cx="120" cy="120" r="22" class="piece-dark"/><text x="120" y="122" class="piece-label-dark">P</text>
        <circle cx="200" cy="120" r="22" class="piece-dark"/><text x="200" y="122" class="piece-label-dark">P</text>
        <circle cx="280" cy="120" r="22" class="piece-dark"/><text x="280" y="122" class="piece-label-dark">P</text>
        <circle cx="360" cy="120" r="22" class="piece-dark"/><text x="360" y="122" class="piece-label-dark">P</text>
        <circle cx="440" cy="120" r="22" class="piece-dark"/><text x="440" y="122" class="piece-label-dark">P</text>
        <circle cx="520" cy="120" r="22" class="piece-dark"/><text x="520" y="122" class="piece-label-dark">P</text>
        <circle cx="600" cy="120" r="22" class="piece-dark"/><text x="600" y="122" class="piece-label-dark">P</text>
      </g>
      <g>
        <circle cx="440" cy="200" r="28" class="piece-dark"/><text x="440" y="202" class="piece-label-dark">N</text>
      </g>
      <g>
        <circle cx="360" cy="360" r="22" class="piece-light"/><text x="360" y="362" class="piece-label-light">P</text>
      </g>
      <g>
        <circle cx="40" cy="520" r="22" class="piece-light"/><text x="40" y="522" class="piece-label-light">P</text>
        <circle cx="120" cy="520" r="22" class="piece-light"/><text x="120" y="522" class="piece-label-light">P</text>
        <circle cx="200" cy="520" r="22" class="piece-light"/><text x="200" y="522" class="piece-label-light">P</text>
        <circle cx="280" cy="520" r="22" class="piece-light"/><text x="280" y="522" class="piece-label-light">P</text>
        <circle cx="440" cy="520" r="22" class="piece-light"/><text x="440" y="522" class="piece-label-light">P</text>
        <circle cx="520" cy="520" r="22" class="piece-light"/><text x="520" y="522" class="piece-label-light">P</text>
        <circle cx="600" cy="520" r="22" class="piece-light"/><text x="600" y="522" class="piece-label-light">P</text>
      </g>
      <g>
        <circle cx="40" cy="600" r="26" class="piece-light"/><text x="40" y="602" class="piece-label-light">R</text>
        <circle cx="120" cy="600" r="26" class="piece-light"/><text x="120" y="602" class="piece-label-light">N</text>
        <circle cx="200" cy="600" r="26" class="piece-light"/><text x="200" y="602" class="piece-label-light">B</text>
        <circle cx="280" cy="600" r="26" class="piece-light"/><text x="280" y="602" class="piece-label-light">Q</text>
        <circle cx="360" cy="600" r="26" class="piece-light"/><text x="360" y="602" class="piece-label-light">K</text>
        <circle cx="440" cy="600" r="26" class="piece-light"/><text x="440" y="602" class="piece-label-light">B</text>
        <circle cx="520" cy="600" r="26" class="piece-light"/><text x="520" y="602" class="piece-label-light">N</text>
        <circle cx="600" cy="600" r="26" class="piece-light"/><text x="600" y="602" class="piece-label-light">R</text>
      </g>
    </g>

    <!-- 선택한 백 나이트의 합법 수 후보 -->
    <circle cx="360" cy="520" r="10" class="legal-dot"/>
    <circle cx="440" cy="440" r="10" class="legal-dot"/>
    <circle cx="600" cy="440" r="10" class="legal-dot"/>
  </g>

  <rect x="270" y="836" width="640" height="52" rx="7" fill="#ffffff" stroke="#dbe1e8"/>
  <text x="292" y="854" class="muted" font-size="11" font-weight="700">색상 메모</text>
  <rect x="292" y="862" width="14" height="10" class="light-square"/>
  <text x="312" y="872" class="muted" font-size="10">밝은 칸 #eef0df</text>
  <rect x="404" y="862" width="14" height="10" class="dark-square"/>
  <text x="424" y="872" class="muted" font-size="10">어두운 칸 #8ca07c</text>
  <rect x="528" y="862" width="14" height="10" class="last-move"/>
  <text x="548" y="872" class="muted" font-size="10">마지막 수 #f5c542 46%</text>
  <rect x="686" y="862" width="14" height="10" class="selected-square"/>
  <text x="706" y="872" class="muted" font-size="10">선택 칸 #7dd3fc 58%</text>
  <circle cx="830" cy="867" r="5" fill="#2563eb" opacity="0.54"/>
  <text x="842" y="872" class="muted" font-size="10">합법 수 #2563eb 54%</text>
  <rect x="292" y="878" width="14" height="8" fill="#2f5f73"/>
  <text x="312" y="886" class="muted" font-size="9">주요 버튼 #2f5f73</text>
  <rect x="420" y="878" width="14" height="8" fill="#ffffff" stroke="#d4dae2"/>
  <text x="440" y="886" class="muted" font-size="9">패널 #ffffff / 선 #d4dae2</text>
  <rect x="570" y="878" width="14" height="8" fill="#f8fafc" stroke="#dbe1e8"/>
  <text x="590" y="886" class="muted" font-size="9">보조 패널 #f8fafc</text>
  <rect x="704" y="878" width="14" height="8" fill="#17202a"/>
  <text x="724" y="886" class="muted" font-size="9">사이드바 #17202a</text>

  <!-- 우측 상세 패널 -->
  <rect x="1064" y="128" width="308" height="760" rx="10" class="panel"/>
  <text x="1090" y="166" class="text" font-size="18" font-weight="700">수순 관리</text>
  <text x="1090" y="190" class="muted" font-size="12">착수 후 SAN 기록이 자연스럽게 나타나는 패널</text>

  <rect x="1090" y="214" width="256" height="380" rx="8" class="subpanel"/>
  <text x="1110" y="244" class="text" font-size="15" font-weight="700">수순 목록</text>
  <text x="1216" y="244" class="muted" font-size="12">SAN</text>
  <g aria-label="수순 목록 보조 액션">
    <rect x="1266" y="224" width="24" height="24" rx="5" class="button-secondary"/>
    <text x="1278" y="241" text-anchor="middle" class="text" font-size="13" font-weight="700">↶</text>
    <rect x="1298" y="224" width="24" height="24" rx="5" class="button-disabled"/>
    <text x="1310" y="241" text-anchor="middle" class="muted" font-size="13" font-weight="700">↷</text>
  </g>
  <line x1="1110" y1="262" x2="1326" y2="262" class="line"/>
  <text x="1122" y="286" class="muted" font-size="11">#</text>
  <text x="1164" y="286" class="muted" font-size="11">백</text>
  <text x="1248" y="286" class="muted" font-size="11">흑</text>
  <line x1="1230" y1="296" x2="1230" y2="472" class="line"/>
  <rect x="1110" y="306" width="216" height="38" rx="6" fill="#ffffff" stroke="#dbe1e8"/>
  <text x="1124" y="330" class="text" font-size="13" font-weight="700">1.</text>
  <text x="1164" y="330" class="text" font-size="13" font-weight="700">e4</text>
  <rect x="1238" y="312" width="76" height="26" rx="5" class="move-cell-active"/>
  <text x="1248" y="330" class="text" font-size="13" font-weight="700">Nf6</text>
  <rect x="1110" y="358" width="216" height="84" rx="7" fill="#ffffff" stroke="#e2e7ee" stroke-dasharray="4 4"/>
  <text x="1218" y="396" text-anchor="middle" class="muted" font-size="12">다음 착수 전까지</text>
  <text x="1218" y="416" text-anchor="middle" class="muted" font-size="12">추가 행은 표시하지 않음</text>
  <line x1="1328" y1="306" x2="1328" y2="474" stroke="#d5dce5" stroke-width="4" stroke-linecap="round"/>
  <line x1="1328" y1="306" x2="1328" y2="348" stroke="#9ca8b6" stroke-width="4" stroke-linecap="round"/>
  <text x="1110" y="526" class="muted" font-size="11">첫 착수 전 목록은 숨김/축약 안내만 표시</text>
  <text x="1110" y="548" class="muted" font-size="11">↶/↷는 목록 조작 보조 액션, 마지막 SAN 셀만 강조</text>

  <rect x="1090" y="618" width="256" height="244" rx="8" class="subpanel"/>
  <text x="1110" y="648" class="text" font-size="15" font-weight="700">보조 탭</text>
  <text x="1172" y="648" class="muted" font-size="12">수순 선택 후 세부 입력</text>

  <g aria-label="수순 보조 탭">
    <rect x="1110" y="666" width="44" height="28" rx="7" fill="#2f5f73"/>
    <text x="1121" y="685" fill="#ffffff" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="12" font-weight="700">SAN</text>
    <rect x="1158" y="666" width="62" height="28" rx="7" fill="#ffffff" stroke="#bcc7d4"/>
    <text x="1172" y="685" class="muted" font-size="12" font-weight="700">코멘트</text>
    <rect x="1224" y="666" width="48" height="28" rx="7" fill="#ffffff" stroke="#bcc7d4"/>
    <text x="1236" y="685" class="muted" font-size="12" font-weight="700">평가</text>
    <rect x="1276" y="666" width="58" height="28" rx="7" fill="#ffffff" stroke="#bcc7d4"/>
    <text x="1283" y="685" class="muted" font-size="11" font-weight="700">기보 정보</text>
  </g>

  <text x="1110" y="724" class="text" font-size="15" font-weight="700">SAN</text>
  <text x="1150" y="724" class="muted" font-size="12">Enter로 적용 가능</text>
  <rect x="1110" y="742" width="154" height="36" rx="7" class="field-focus"/>
  <text x="1124" y="765" class="muted" font-size="13">예: Nf6</text>
  <rect x="1274" y="742" width="52" height="36" rx="7" class="button-primary"/>
  <text x="1287" y="765" fill="#ffffff" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700">적용</text>
  <rect x="1110" y="794" width="216" height="28" rx="14" class="badge"/>
  <text x="1122" y="812" class="muted" font-size="12">최근 SAN: 1... Nf6</text>
  <text x="1110" y="842" class="muted" font-size="11">다음 착수는 백 SAN으로 기록</text>

  <!-- 설계 메모 -->
  <rect x="160" y="904" width="1212" height="22" rx="5" fill="#eef2f6"/>
  <text x="176" y="919" class="muted" font-size="11">구현 후보 메모: 전역 사이드바 88px, 상단 바 64px, 보드 640px 정사각형, 우측 패널 308px. 수순은 행 단위 2열(백/흑)이며 마지막 착수 셀만 강조. SAN은 별도 영역이 아니라 SAN/코멘트/평가/기보 정보 탭 중 SAN 활성 탭 내용으로 포함.</text>
</svg>
