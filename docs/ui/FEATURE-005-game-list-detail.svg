      .selected { fill: #e9f2f5; stroke: #2f5f73; stroke-width: 1.5; }
      .row { fill: #ffffff; stroke: #e4e8ee; stroke-width: 1; }
      .muted-fill { fill: #eef2f6; }
      .readonly { fill: #f1f4f7; stroke: #cfd7e2; stroke-width: 1; }
      .editable { fill: #fffaf0; stroke: #e2b94b; stroke-width: 1.2; }
      .accent { fill: #2f5f73; }
      .success { fill: #e9f7ef; stroke: #83c59b; stroke-width: 1; }
      .danger { fill: #fff0f0; stroke: #e28b8b; stroke-width: 1; }
      .warning { fill: #fff8df; stroke: #e2b94b; stroke-width: 1; }
      .text { fill: #182026; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .muted { fill: #667085; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .inverse { fill: #ffffff; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .small { font-size: 12px; }
      .label { font-size: 13px; font-weight: 700; }
      .body { font-size: 14px; }
      .title { font-size: 20px; font-weight: 700; }
      .section-title { font-size: 16px; font-weight: 700; }
      .mono { font-family: 'Courier New', monospace; }
      .light-square { fill: #eef0df; }
      .dark-square { fill: #8ca07c; }
      .piece-light { fill: #fbfbfb; stroke: #20242a; stroke-width: 1.1; }
      .piece-dark { fill: #20242a; stroke: #20242a; stroke-width: 1.1; }
      .piece-label-light { fill: #20242a; font-family: Georgia, serif; font-weight: 700; }
      .piece-label-dark { fill: #ffffff; font-family: Georgia, serif; font-weight: 700; }
      .arrow { fill: none; stroke: #93a3b5; stroke-width: 2; marker-end: url(#arrow-head); }
    </style>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#101820" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-head" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#93a3b5"/>
    </marker>
  </defs>

  <rect width="1600" height="1260" class="bg"/>
  <text x="56" y="52" class="text title">FEATURE-005 기보 목록과 상세 조회</text>
  <text x="56" y="80" class="muted body">전역 사이드바에서 기보를 선택하면 목록 중심 화면으로 전환되고, 목록 항목 선택 후 상세 화면은 FEATURE-003의 보드 + 수순 목록 + 메타데이터 탭 구조를 따른다.</text>

