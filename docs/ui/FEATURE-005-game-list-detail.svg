<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1260" viewBox="0 0 1600 1260" role="img" aria-labelledby="title desc">
  <title id="title">FEATURE-005 기보 목록과 상세 조회 중간 충실도 목업</title>
  <desc id="desc">좌측 전역 사이드바에서 기보를 선택한 뒤 메인 화면 전체가 기보 목록 뷰로 전환된 상태와, 특정 기보 선택 후 FEATURE-003의 중앙 보드 및 우측 수순 목록 + 메타데이터 탭 구조를 재사용하는 상세 뷰로 전환되는 상태를 한 SVG 안에 함께 표현한 UI 스케치다. 목록의 날짜순 정렬, 결과, 종료 사유, 짧은 수순 요약, 선택 상태와 상세 화면의 읽기 전용 정식 수순 및 수정 가능한 코멘트/평가 단서를 보여준다.</desc>

  <defs>
    <style>
      .bg { fill: #f5f7f8; }
      .frame { fill: #ffffff; stroke: #cfd6df; stroke-width: 1.2; }
      .topbar { fill: #fbfcfd; stroke: #e0e5eb; stroke-width: 1; }
      .sidebar { fill: #1f2a30; }
      .sidebar-active { fill: #2f5f73; }
