<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">TASK-098 체크 상태 표시 UI 목업</title>
  <desc id="desc">착수 후 현재 턴의 왕이 체크 상태일 때 보드의 왕 칸에 붉은 테두리 링을 표시하고, 현재 턴 상태 옆에 체크 배지를 노출하는 중간 충실도 목업이다. 마지막 착수 하이라이트는 배경으로 유지하고, 체크 표시는 테두리 레이어로 올려 겹침 상태에서도 왕 칸을 식별할 수 있게 한다.</desc>

  <defs>
    <style>
      .page { fill: #f4f6f8; }
      .surface { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d4dae2; stroke-width: 1.2; }
      .subpanel { fill: #f8fafc; stroke: #dbe1e8; stroke-width: 1; }
      .line { stroke: #dbe1e8; stroke-width: 1; }
      .text { fill: #15171a; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .muted { fill: #687381; font-family: Arial, 'Noto Sans KR', sans-serif; }
      .small { fill: #687381; font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 12px; }
      .light-square { fill: #eef0df; }
      .dark-square { fill: #8ca07c; }
      .last-move { fill: #f5c542; opacity: 0.46; }
      .selected-square { fill: #7dd3fc; opacity: 0.48; }
      .legal-dot { fill: #2563eb; opacity: 0.54; }
      .capture-ring { fill: none; stroke: #2563eb; stroke-width: 4; opacity: 0.70; }
      .check-ring { fill: none; stroke: #dc2626; stroke-width: 5; }
      .check-inner { fill: none; stroke: #fff7ed; stroke-width: 2; opacity: 0.95; }
      .piece-light { fill: #fbfbfb; stroke: #20242a; stroke-width: 1.3; }
      .piece-dark { fill: #20242a; stroke: #20242a; stroke-width: 1.3; }
      .piece-label-light { fill: #20242a; font-family: Georgia, serif; font-weight: 700; }
      .piece-label-dark { fill: #ffffff; font-family: Georgia, serif; font-weight: 700; }
      .badge { fill: #fff1f2; stroke: #dc2626; stroke-width: 1.3; }
      .badge-text { fill: #991b1b; font-family: Arial, 'Noto Sans KR', sans-serif; font-weight: 700; }
      .turn-badge { fill: #eef4f7; stroke: #c8d6df; stroke-width: 1; }
      .note { fill: #fff7e6; stroke: #f0c36a; stroke-width: 1; }
      .ok { fill: #ecfdf5; stroke: #72a897; stroke-width: 1; }
      .arrow { fill: none; stroke: #2f5f73; stroke-width: 2; marker-end: url(#arrow-head); }
    </style>
    <filter id="soft-shadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <pattern id="board-pattern" width="112" height="112" patternUnits="userSpaceOnUse">
      <rect width="112" height="112" class="light-square"/>
      <rect x="56" y="0" width="56" height="56" class="dark-square"/>
      <rect x="0" y="56" width="56" height="56" class="dark-square"/>
    </pattern>
    <marker id="arrow-head" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2f5f73"/>
    </marker>
  </defs>

  <rect width="1280" height="860" class="page"/>
  <rect x="40" y="36" width="1200" height="788" rx="12" class="surface" filter="url(#soft-shadow)"/>

  <text x="72" y="82" class="text" font-size="24" font-weight="700">TASK-098 체크 상태 표시 UI</text>
  <text x="72" y="110" class="muted" font-size="14">체크받은 왕 칸은 붉은 테두리 링으로 표시하고, 현재 턴 상태 옆에 체크 배지를 둔다.</text>

  <rect x="72" y="138" width="740" height="626" rx="10" class="panel"/>
  <text x="102" y="176" class="text" font-size="17" font-weight="700">기본 상태: 백 왕 체크</text>
  <text x="102" y="200" class="muted" font-size="13">흑 룩의 마지막 착수 Re8+ 이후 현재 턴은 백이고, e1 백 왕 칸에 체크 링이 표시된다.</text>

  <g transform="translate(128 236)">
    <rect x="0" y="0" width="448" height="448" rx="6" fill="#ffffff" stroke="#b9c3cf" stroke-width="2"/>
    <rect x="0" y="0" width="448" height="448" fill="url(#board-pattern)"/>

    <!-- 마지막 착수: e7-e8 -->
    <rect x="224" y="56" width="56" height="56" class="last-move"/>
    <rect x="224" y="0" width="56" height="56" class="last-move"/>

    <!-- 선택/합법 수 예시: 체크 표시와 별도 레이어 -->
    <rect x="168" y="392" width="56" height="56" class="selected-square"/>
    <circle cx="196" cy="364" r="8" class="legal-dot"/>
    <circle cx="252" cy="364" r="22" class="capture-ring"/>

    <g class="muted" font-size="10">
      <text x="8" y="18">8</text><text x="8" y="74">7</text><text x="8" y="130">6</text><text x="8" y="186">5</text>
      <text x="8" y="242">4</text><text x="8" y="298">3</text><text x="8" y="354">2</text><text x="8" y="410">1</text>
      <text x="26" y="436">a</text><text x="82" y="436">b</text><text x="138" y="436">c</text><text x="194" y="436">d</text>
      <text x="250" y="436">e</text><text x="306" y="436">f</text><text x="362" y="436">g</text><text x="418" y="436">h</text>
    </g>

    <g font-size="22" text-anchor="middle" dominant-baseline="middle">
      <circle cx="252" cy="28" r="20" class="piece-dark"/><text x="252" y="30" class="piece-label-dark">R</text>
      <circle cx="28" cy="28" r="20" class="piece-dark"/><text x="28" y="30" class="piece-label-dark">K</text>
      <circle cx="252" cy="420" r="20" class="piece-light"/><text x="252" y="422" class="piece-label-light">K</text>
      <circle cx="196" cy="420" r="18" class="piece-light"/><text x="196" y="422" class="piece-label-light">Q</text>
      <circle cx="364" cy="364" r="18" class="piece-light"/><text x="364" y="366" class="piece-label-light">P</text>
    </g>

    <!-- 체크받은 왕 칸: e1 -->
    <rect x="226" y="394" width="52" height="52" rx="5" class="check-inner"/>
    <rect x="226" y="394" width="52" height="52" rx="5" class="check-ring"/>
    <path d="M252 56 C252 150, 252 280, 252 390" class="arrow"/>
  </g>

  <g transform="translate(610 238)">
    <rect x="0" y="0" width="164" height="124" rx="9" class="subpanel"/>
    <text x="16" y="30" class="text" font-size="14" font-weight="700">상태 영역</text>
    <rect x="16" y="50" width="82" height="28" rx="14" class="turn-badge"/>
    <text x="32" y="69" class="text" font-size="12" font-weight="700">현재 턴 백</text>
    <rect x="16" y="86" width="82" height="28" rx="14" class="badge"/>
    <text x="34" y="105" class="badge-text" font-size="12">백 체크</text>
  </g>

  <g transform="translate(610 390)">
    <rect x="0" y="0" width="164" height="198" rx="9" class="ok"/>
    <text x="16" y="30" class="text" font-size="14" font-weight="700">레이어 규칙</text>
    <text x="16" y="58" class="muted" font-size="12">1. 기본 칸 색</text>
    <text x="16" y="82" class="muted" font-size="12">2. 마지막 착수 배경</text>
    <text x="16" y="106" class="muted" font-size="12">3. 선택/합법 수 표시</text>
    <text x="16" y="130" class="muted" font-size="12">4. 체크 왕 칸 테두리</text>
    <text x="16" y="162" class="muted" font-size="12">체크는 배경을 덮지 않고</text>
    <text x="16" y="184" class="muted" font-size="12">테두리로 가장 위에 둔다.</text>
  </g>

  <rect x="844" y="138" width="364" height="626" rx="10" class="panel"/>
  <text x="874" y="176" class="text" font-size="17" font-weight="700">겹침 상태 검토</text>
  <text x="874" y="200" class="muted" font-size="13">마지막 착수 칸과 체크 왕 칸이 같아도 체크 링이 유지되어야 한다.</text>

  <g transform="translate(902 238)">
    <rect x="0" y="0" width="224" height="224" rx="6" fill="#ffffff" stroke="#b9c3cf" stroke-width="2"/>
    <rect x="0" y="0" width="224" height="224" fill="url(#board-pattern)"/>

    <!-- 축약 보드: e1 칸에 마지막 착수와 체크가 동시에 존재 -->
    <rect x="112" y="196" width="28" height="28" class="last-move"/>
    <rect x="84" y="168" width="28" height="28" class="selected-square"/>
    <circle cx="154" cy="182" r="5" class="legal-dot"/>

    <g font-size="14" text-anchor="middle" dominant-baseline="middle">
      <circle cx="126" cy="210" r="12" class="piece-light"/><text x="126" y="212" class="piece-label-light">K</text>
      <circle cx="126" cy="14" r="12" class="piece-dark"/><text x="126" y="16" class="piece-label-dark">R</text>
    </g>
    <rect x="114" y="198" width="24" height="24" rx="3" class="check-inner"/>
    <rect x="114" y="198" width="24" height="24" rx="3" class="check-ring"/>
  </g>

  <g transform="translate(874 500)">
    <rect x="0" y="0" width="304" height="170" rx="9" class="note"/>
    <text x="18" y="30" class="text" font-size="14" font-weight="700">구현 메모</text>
    <text x="18" y="58" class="muted" font-size="12">`checkedSquare`는 `ChessBoard` prop으로 전달한다.</text>
    <text x="18" y="82" class="muted" font-size="12">`ChessSquare`는 `data-checked`를 제공한다.</text>
    <text x="18" y="106" class="muted" font-size="12">배지는 체크 상태에서만 DOM에 둔다.</text>
    <text x="18" y="130" class="muted" font-size="12">체크메이트 배너와 착수 차단은 제외한다.</text>
  </g>

  <line x1="72" y1="792" x2="1208" y2="792" class="line"/>
  <text x="72" y="820" class="small">색상 메모: 체크 링은 #dc2626, 안쪽 보정선은 #fff7ed를 사용한다. 마지막 착수 #f5c542 배경과 겹쳐도 체크 링이 가장 위에 보인다.</text>
  <text x="72" y="842" class="small">범위 메모: 이 목업은 체크 상태 표시만 다룬다. 체크메이트, 스테일메이트, 게임 종료 배너, 새 착수 차단은 TASK-097에서 결정한다.</text>
</svg>
