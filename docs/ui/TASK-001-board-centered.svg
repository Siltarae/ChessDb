<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">TASK-001 보드 중심 기보 입력 화면 shell 목업</title>
  <desc id="desc">데스크탑 2열 레이아웃에서 정사각형 보드 영역을 가장 큰 시각 중심으로 배치하고, 오른쪽에는 수순, 메모, 작업 버튼을 위한 사이드 패널 자리만 표현한 SVG 목업이다. 실제 8x8 보드, 기물, 합법 수, 수순 데이터, 저장 API는 포함하지 않는다.</desc>

  <defs>
    <linearGradient id="page-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fa"/>
      <stop offset="1" stop-color="#eef1f4"/>
    </linearGradient>
    <pattern id="board-placeholder" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="34" height="34" fill="#d8dee6"/>
      <line x1="0" y1="0" x2="0" y2="34" stroke="#c6ced8" stroke-width="8" opacity="0.45"/>
    </pattern>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
    <style>
      .label { font-family: Arial, 'Noto Sans KR', sans-serif; fill: #1f2937; }
      .muted { font-family: Arial, 'Noto Sans KR', sans-serif; fill: #667085; }
      .hairline { stroke: #d7dde5; stroke-width: 1; }
      .panel { fill: #ffffff; stroke: #d7dde5; stroke-width: 1; rx: 8; }
      .placeholder { fill: #eef2f6; stroke: #d7dde5; stroke-width: 1; rx: 6; }
      .button { fill: #2f5f73; rx: 6; }
      .button-secondary { fill: #ffffff; stroke: #b8c3cf; stroke-width: 1; rx: 6; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="url(#page-bg)"/>

  <!-- 데스크탑 앱 프레임 -->
  <rect x="48" y="44" width="1048" height="852" rx="10" fill="#ffffff" stroke="#cfd7e2" filter="url(#soft-shadow)"/>
  <rect x="48" y="44" width="1048" height="56" rx="10" fill="#f9fafb" stroke="#cfd7e2"/>
  <rect x="48" y="88" width="1048" height="1" fill="#d7dde5"/>

  <text x="76" y="78" class="label" font-size="18" font-weight="700">새 기보 입력</text>
  <text x="206" y="78" class="muted" font-size="13">보드와 입력 패널이 분리된 작업 화면</text>

  <rect x="870" y="61" width="72" height="24" rx="5" fill="#eef2f6" stroke="#d7dde5"/>
  <text x="891" y="78" class="muted" font-size="11">초안</text>
  <rect x="956" y="58" width="112" height="30" rx="6" fill="#ffffff" stroke="#b8c3cf"/>
  <text x="981" y="78" class="label" font-size="12">나가기</text>

  <!-- 본문 레이아웃 -->
  <rect x="76" y="128" width="672" height="672" rx="8" fill="#f4f6f8" stroke="#cfd7e2"/>
  <rect x="100" y="152" width="624" height="624" rx="6" fill="url(#board-placeholder)" stroke="#9aa7b5" stroke-width="2"/>
  <rect x="118" y="170" width="588" height="588" rx="4" fill="#ffffff" opacity="0.24"/>
  <line x1="100" y1="152" x2="724" y2="776" stroke="#eef2f6" stroke-width="2" opacity="0.8"/>
  <line x1="724" y1="152" x2="100" y2="776" stroke="#eef2f6" stroke-width="2" opacity="0.8"/>
  <text x="412" y="445" text-anchor="middle" class="label" font-size="28" font-weight="700">보드 슬롯</text>
  <text x="412" y="476" text-anchor="middle" class="muted" font-size="15">정사각형 비율 유지 · 실제 칸/기물은 후속 Task</text>

  <rect x="100" y="816" width="624" height="28" rx="6" fill="#eef2f6" stroke="#d7dde5"/>
  <text x="412" y="835" text-anchor="middle" class="muted" font-size="12">보드 하단 상태/좌표 자리: 현재는 placeholder</text>

  <!-- 사이드 패널 -->
  <rect x="780" y="128" width="288" height="716" rx="8" fill="#ffffff" stroke="#cfd7e2"/>
  <text x="804" y="164" class="label" font-size="17" font-weight="700">기보 작업 패널</text>
  <text x="804" y="187" class="muted" font-size="12">보드와 독립 스크롤 영역</text>

  <rect x="804" y="212" width="72" height="30" rx="6" fill="#e8eef3" stroke="#c7d2df"/>
  <text x="826" y="232" class="label" font-size="12" font-weight="700">수순</text>
  <rect x="884" y="212" width="72" height="30" rx="6" fill="#ffffff" stroke="#c7d2df"/>
  <text x="906" y="232" class="muted" font-size="12">메모</text>
  <rect x="964" y="212" width="72" height="30" rx="6" fill="#ffffff" stroke="#c7d2df"/>
  <text x="986" y="232" class="muted" font-size="12">작업</text>

  <rect x="804" y="262" width="240" height="302" rx="6" fill="#f8fafc" stroke="#d7dde5"/>
  <text x="824" y="294" class="label" font-size="14" font-weight="700">수순 목록 자리</text>
  <text x="824" y="318" class="muted" font-size="12">실제 수순 데이터 없음</text>
  <rect x="824" y="346" width="196" height="18" rx="4" fill="#e5eaf0"/>
  <rect x="824" y="378" width="168" height="18" rx="4" fill="#e5eaf0"/>
  <rect x="824" y="410" width="206" height="18" rx="4" fill="#e5eaf0"/>
  <rect x="824" y="442" width="148" height="18" rx="4" fill="#e5eaf0"/>
  <rect x="824" y="474" width="190" height="18" rx="4" fill="#e5eaf0"/>
  <line x1="1030" y1="286" x2="1030" y2="540" stroke="#d7dde5" stroke-width="4" stroke-linecap="round"/>
  <line x1="1030" y1="286" x2="1030" y2="352" stroke="#9aa7b5" stroke-width="4" stroke-linecap="round"/>

  <rect x="804" y="584" width="240" height="116" rx="6" fill="#f8fafc" stroke="#d7dde5"/>
  <text x="824" y="616" class="label" font-size="14" font-weight="700">메모 입력 자리</text>
  <rect x="824" y="638" width="198" height="14" rx="4" fill="#e5eaf0"/>
  <rect x="824" y="664" width="154" height="14" rx="4" fill="#e5eaf0"/>

  <rect x="804" y="724" width="112" height="38" class="button"/>
  <text x="838" y="748" fill="#ffffff" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700">저장 자리</text>
  <rect x="928" y="724" width="116" height="38" class="button-secondary"/>
  <text x="956" y="748" class="label" font-size="13" font-weight="700">초기화 자리</text>
  <rect x="804" y="778" width="240" height="42" rx="6" fill="#f4f6f8" stroke="#d7dde5"/>
  <text x="824" y="804" class="muted" font-size="12">작업 버튼은 연결 전 placeholder</text>

  <!-- 모바일 보조 프레임 -->
  <text x="1154" y="72" class="label" font-size="16" font-weight="700">모바일 스택 참고</text>
  <rect x="1148" y="96" width="220" height="448" rx="20" fill="#ffffff" stroke="#cfd7e2" filter="url(#soft-shadow)"/>
  <rect x="1162" y="116" width="192" height="26" rx="6" fill="#f9fafb" stroke="#d7dde5"/>
  <text x="1174" y="134" class="label" font-size="11" font-weight="700">새 기보 입력</text>
  <rect x="1162" y="160" width="192" height="192" rx="8" fill="url(#board-placeholder)" stroke="#9aa7b5"/>
  <text x="1258" y="260" text-anchor="middle" class="label" font-size="14" font-weight="700">보드 슬롯</text>
  <rect x="1162" y="370" width="192" height="54" rx="7" fill="#f8fafc" stroke="#d7dde5"/>
  <text x="1176" y="402" class="muted" font-size="11">수순 패널 자리</text>
  <rect x="1162" y="436" width="192" height="54" rx="7" fill="#f8fafc" stroke="#d7dde5"/>
  <text x="1176" y="468" class="muted" font-size="11">메모/작업 자리</text>
  <rect x="1162" y="506" width="88" height="24" rx="5" fill="#2f5f73"/>
  <rect x="1262" y="506" width="92" height="24" rx="5" fill="#ffffff" stroke="#b8c3cf"/>

  <!-- 설계 메모 -->
  <rect x="1148" y="584" width="220" height="224" rx="8" fill="#ffffff" stroke="#cfd7e2"/>
  <text x="1170" y="620" class="label" font-size="15" font-weight="700">메모</text>
  <text x="1170" y="654" class="muted" font-size="12">색상: 흰 배경, 회색 경계,</text>
  <text x="1170" y="674" class="muted" font-size="12">강조 버튼만 저채도 청록</text>
  <text x="1170" y="710" class="muted" font-size="12">간격: 본문 28px, 패널 내부</text>
  <text x="1170" y="730" class="muted" font-size="12">20px 전후로 조용하게 유지</text>
  <text x="1170" y="766" class="muted" font-size="12">후보: layout slot, Card는</text>
  <text x="1170" y="786" class="muted" font-size="12">반복 항목에만 제한 사용</text>

  <text x="76" y="884" class="muted" font-size="12">범위 밖: 실제 8x8 칸, 기물, 합법 수, 수순 데이터, 저장 API. 이 목업은 TASK-001 화면 shell과 배치 계약만 표현한다.</text>
</svg>
