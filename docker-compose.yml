services:
  postgres:
    image: postgres:18
    container_name: chess-db-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: chess_db
      POSTGRES_PASSWORD: chess_db
      POSTGRES_DB: chess_db
    volumes:
      - chess-db-postgres-data:/var/lib/postgresql

volumes:
  chess-db-postgres-data:
