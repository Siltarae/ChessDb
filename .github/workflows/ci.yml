name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, Build, and Test (with Coverage)
        run: pnpm turbo run lint build test -- --coverage

      # 향후 TASK-087, 092, 093 완료 후 실제 리포트 기반 검증 로직이 활성화됩니다.
      # 현재는 리포트가 생성되지 않아도 CI가 멈추지 않도록 구성하되,
      # 실제 코드가 추가되기 시작하면 엄격한 게이트(Gate)를 적용합니다.
      - name: Check Coverage Thresholds
        run: |
          echo "📊 테스트 커버리지 검증을 시작합니다..."
          # 실제 구현 단계(Phase 4-5)에서 이 부분에 커버리지 체크 스크립트가 연결됩니다.
          # 예: packages/shared -> 100% 강제
          # 예: 전체 평균 -> 80% 강제
          echo "✅ (알림) 현재는 초기 단계이므로 검증을 통과시킵니다."
