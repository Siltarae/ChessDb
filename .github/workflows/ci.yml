name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://chess_db:chess_db@localhost:5432/chess_db?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format, Lint, Build, and Test
        run: pnpm turbo run format:check lint build test

      - name: Enforce Shared Coverage Thresholds
        run: pnpm --filter @chess-db/shared test:coverage

      - name: Enforce Web Coverage Thresholds
        run: pnpm --filter @chess-db/web test:coverage
